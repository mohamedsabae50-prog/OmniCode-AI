<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .editor-box { background: #0a0e17; border: 1px solid #21262d; border-radius: 1.25rem; direction: ltr !important; text-align: left !important; color: #58a6ff; }
        textarea { font-size: 16px !important; } 
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .code-container { background: #0d1117; border-radius: 1.5rem; border: 1px solid #30363d; overflow: hidden; direction: ltr !important; }
        .code-header { background: #161b22; padding: 10px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        pre { padding: 1rem !important; margin: 0 !important; font-size: 13px !important; text-align: left !important; line-height: 1.6; white-space: pre !important; }
        .btn-interact { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .btn-interact:active { transform: scale(0.92); }
        .emoji-pop { position: absolute; pointer-events: none; animation: popUp 0.8s ease-out forwards; opacity: 0; font-size: 1.8rem; top: -20px; left: 50%; transform: translateX(-50%); }
        @keyframes popUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50px) scale(1.3); opacity: 0; } }
        .feedback-btn { transition: 0.3s; opacity: 0.4; cursor: pointer; }
        .feedback-btn:hover, .feedback-btn.active { opacity: 1; transform: scale(1.3); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 rtl">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 p-6 glass rounded-[2.5rem] shadow-2xl gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-3xl font-black italic tracking-tighter text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[10px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3 items-center w-full md:w-auto">
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <optgroup label="الاكثر استخداماً">
                    <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option><option value="C++">C++</option><option value="Java">Java</option>
                </optgroup>
                <optgroup label="لغات أخرى">
                    <option value="C#">C#</option><option value="SQL">SQL</option><option value="Go">Go</option><option value="PHP">PHP</option><option value="Rust">Rust</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <div class="space-y-6">
            <div class="glass p-6 md:p-8 rounded-[3rem] shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-5">
                        <button onclick="animateBtn(this, '📋'); pasteToCode()" class="btn-interact text-[11px] text-emerald-500 font-bold flex items-center gap-1"><i class="fas fa-paste"></i> <span data-i18n="paste">لصق</span></button>
                        <label class="btn-interact text-[11px] text-blue-500 font-bold cursor-pointer flex items-center gap-1"><i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span data-i18n="upload">رفع ملف</span></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-72 editor-box p-6 text-sm outline-none resize-none font-mono mb-4 border border-slate-800 focus:border-blue-500 transition shadow-inner" placeholder="..."></textarea>
                <span class="text-[10px] font-bold text-slate-500 uppercase block mb-2" data-i18n="terminal_lbl">رسالة الخطأ من التيرمنال (اختياري)</span>
                <textarea id="errorInput" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs text-red-400 outline-none resize-none mb-4" placeholder="Error Log..."></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-6 focus:border-blue-500 transition shadow-lg" data-i18n-ph="ph_inq">
                <button onclick="animateBtn(this, '🚀'); runDebugger()" id="runBtn" class="btn-interact w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl"><span data-i18n="btn">تصحيح وتحويل ذكي ⚡</span></button>
            </div>
        </div>

        <div class="space-y-6">
            <div id="loader" class="hidden glass rounded-[3rem] flex flex-col items-center justify-center p-12 text-center min-h-[400px] z-10"><i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i><p class="text-sm font-bold animate-pulse text-blue-400" data-i18n="loading">جاري تحليل المنطق جراحياً...</p></div>
            <div id="placeholder" class="glass min-h-[400px] rounded-[3rem] flex flex-col items-center justify-center text-slate-500 p-12 text-center border border-dashed border-slate-800"><i class="fas fa-code-branch text-6xl mb-6 opacity-10"></i><p class="text-sm italic" data-i18n="placeholder">التحليل والحل سيظهر هنا.</p></div>

            <div id="resultArea" class="hidden space-y-6 animate-in fade-in duration-500">
                <div class="glass p-6 md:p-8 rounded-[2rem] border-r-8 border-emerald-500 shadow-2xl">
                    <h4 class="text-[11px] font-black text-emerald-400 mb-3 uppercase tracking-widest" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed font-medium"></p>
                </div>
                <div class="code-container shadow-2xl">
                    <div class="code-header bg-[#161b22] px-5 py-3 flex justify-between items-center border-b border-white/5">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" data-i18n="corrected_lbl">الكود المصحح</span>
                        <button onclick="animateBtn(this, '✨'); copyCode()" id="copyBtn" class="btn-interact text-blue-500 hover:text-blue-400 text-xs font-black flex items-center gap-1"><i id="copyIcon" class="fas fa-copy"></i> <span id="copyTxt" data-i18n="copy">نسخ</span></button>
                    </div>
                    <pre id="preCode"><code></code></pre>
                </div>
                <div id="feedbackBox" class="glass p-6 rounded-[2rem] text-center"><p class="text-xs font-bold text-slate-500 mb-4" data-i18n="feedback_q">هل النتيجة مرضية؟</p><div class="flex justify-center gap-10"><i onclick="animateBtn(this, '💚'); setRating('good')" class="fas fa-thumbs-up text-3xl feedback-btn text-emerald-500"></i><i onclick="animateBtn(this, '💔'); setRating('bad')" class="fas fa-thumbs-down text-3xl feedback-btn text-red-500"></i></div></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي بالذكاء الاصطناعي العالمي", editor: "محرر الكود", upload: "رفع ملف", terminal_lbl: "رسالة الخطأ من التيرمنال (اختياري)", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل والحل سيظهر هنا بتنسيق احترافي.", loading: "جاري تحليل المنطق جراحياً...", ph_code: "🔙 ضـع كـودك هـنـا (Ctrl+V)", ph_inq: "عايز تعمل إيه بالكود؟", copy: "نسخ", copied: "تم النسخ 😊", paste: "لصق", analysis_title: "تحليل ذكاء AETHER", corrected_lbl: "الكود المصحح", feedback_q: "هل النتيجة مرضية؟" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", upload: "Upload", terminal_lbl: "Terminal Error (Optional)", btn: "Aether Debug ⚡", placeholder: "Results here.", loading: "Surgical Analysis...", ph_code: "🔙 Paste code here...", ph_inq: "Goal?", copy: "COPY", copied: "Copied 😊", paste: "Paste", analysis_title: "AETHER ANALYSIS", corrected_lbl: "CORRECTED CODE", feedback_q: "Satisfied?" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value;
            const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('codeInput').placeholder = t.ph_code;
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        function animateBtn(btn, emoji) { const pop = document.createElement('span'); pop.className = 'emoji-pop'; pop.innerText = emoji; btn.appendChild(pop); setTimeout(() => pop.remove(), 800); }

        async function runDebugger() {
            const code = document.getElementById('codeInput').value, inquiry = document.getElementById('inquiryInput').value, uiLang = document.getElementById('uiLang').value;
            if(!code && !inquiry) return alert(uiLang === 'ar' ? "اكتب حاجة يا هندسة!" : "Write something first!");
            document.getElementById('loader').classList.remove('hidden'); document.getElementById('placeholder').classList.add('hidden'); document.getElementById('resultArea').classList.add('hidden');
            const fd = new FormData(); fd.append('code', code || ""); fd.append('lang', document.getElementById('progLang').value); fd.append('ui_lang', uiLang); fd.append('inquiry', inquiry); fd.append('error_log', document.getElementById('errorInput').value);
            try {
                const response = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await response.json();
                document.getElementById('expText').innerText = data.explanation;
                const pre = document.getElementById('preCode');
                const selectedLang = document.getElementById('progLang').value.toLowerCase();
                const cleanRes = (data.result || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                pre.innerHTML = `<code class="language-${selectedLang}">${cleanRes}</code>`;
                setTimeout(() => { Prism.highlightElement(pre.querySelector('code')); document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden'); }, 100);
            } catch (e) { alert("Error!"); document.getElementById('loader').classList.add('hidden'); document.getElementById('placeholder').classList.remove('hidden'); }
        }

        function copyCode() {
            const t = i18n[document.getElementById('uiLang').value];
            navigator.clipboard.writeText(document.querySelector('#preCode code').textContent).then(() => {
                const txt = document.getElementById('copyTxt'), icon = document.getElementById('copyIcon');
                txt.innerText = t.copied; icon.className = 'fas fa-face-grin-squint-tears text-emerald-500';
                setTimeout(() => { txt.innerText = t.copy; icon.className = 'fas fa-copy text-blue-500'; }, 2500);
            });
        }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
        function setRating(r) { alert("شكراً لتقييمك يا هندسة!"); }
    </script>
</body>
</html>
