<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCode AI | Pro Compact v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: radial-gradient(circle at center, #0d1117 0%, #01040a 100%); color: #e6edf3; font-family: 'Segoe UI', sans-serif; transition: 0.4s; overflow-x: hidden; position: relative; min-height: 100vh; font-size: 13px; }
        .glass-pro { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 1.2rem; }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(88,166,255,0.05); border-radius: 1rem; overflow: hidden; direction: ltr; margin-top: 8px; }
        .diff-box { background: #0d1117; padding: 12px; overflow-y: auto; height: auto; min-height: 180px; max-height: 400px; }
        pre { white-space: pre-wrap !important; word-break: break-all; font-size: 11px !important; line-height: 1.5; margin: 0 !important; }
        .btn-interact { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; overflow: hidden; }
        .history-pill { background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; font-size: 9px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; white-space: nowrap; color: #8b949e; }
        .history-pill:hover { background: rgba(88,166,255,0.2); border-color: #58a6ff; color: white; }
        .perf-badge { background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,165,0,0.05) 100%); border: 1px solid rgba(255,215,0,0.2); color: #ffd700; padding: 6px 12px; border-radius: 10px; font-family: monospace; font-size: 11px; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 6px; }
        .feedback-icon { transition: 0.4s; cursor: pointer; opacity: 0.3; }
        .feedback-icon.active, .feedback-icon:hover { opacity: 1; }
        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%); filter: blur(30px); pointer-events: none; }
    </style>
</head>
<body class="p-2 md:p-4 rtl">
    <div class="glass-background-elements fixed inset-0 -z-10" id="glassParticles"></div>

    <div class="max-w-6xl mx-auto mb-3 flex gap-2 overflow-x-auto p-1 no-scrollbar" id="historyContainer"></div>

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-5 p-4 glass-pro shadow-xl gap-4">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[8px] text-slate-400 uppercase tracking-widest italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-2">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-[10px] font-bold text-white outline-none"><option value="ar">العربية</option><option value="en">English</option></select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-[10px] font-bold text-white outline-none">
                <optgroup label="Languages">
                    <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option><option value="Java">Java</option><option value="C++">C++</option><option value="SQL">SQL</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-5 items-start">
        <div class="space-y-5">
            <div class="glass-pro p-5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest" data-i18n="editor">محرر الأكواد</span>
                    <div class="flex gap-3">
                        <button onclick="pasteToCode()" class="text-emerald-400 text-[10px]">📋 لصق</button>
                        <label class="text-blue-400 text-[10px] cursor-pointer">📁 رفع ملف<input type="file" class="hidden" onchange="handleFile(this)"></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-56 bg-[#05070a] border border-slate-800 rounded-xl p-4 text-xs outline-none font-mono mb-3 text-blue-300" style="direction: ltr; text-align: left;" placeholder="🔙 ضـع كـودك هـنـا"></textarea>
                <span class="text-[8px] font-bold text-slate-500 uppercase block mb-1" data-i18n="error_lbl">رسالة الخطأ (اختياري)</span>
                <textarea id="errorInput" class="w-full h-16 bg-[#05070a] border border-slate-800 rounded-xl p-3 text-[10px] text-red-400 outline-none mb-3" style="direction: ltr; text-align: left;" placeholder="Paste error here..."></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-xs outline-none mb-4 text-white" data-i18n-ph="ph_inq">
                <button onclick="runDebugger()" id="runBtn" class="btn-interact w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-xs text-white shadow-xl"><span data-i18n="btn">تحليل ومعالجة ⚡</span></button>
            </div>
        </div>

        <div class="space-y-5 relative min-h-[500px]" id="resultNode">
            <div id="loader" class="hidden glass-pro rounded-xl absolute inset-0 flex flex-col items-center justify-center p-10 z-50"><i class="fas fa-atom fa-spin text-3xl text-blue-500 mb-3"></i><p class="animate-pulse text-xs font-bold text-blue-400" data-i18n="loading">استحضار الذكاء... ✨</p></div>
            <div id="placeholder" class="glass-pro h-[450px] flex flex-col items-center justify-center text-slate-600 border-dashed border border-slate-800"><p class="text-xs italic" data-i18n="placeholder">بانتظار الأكواد للتحليل...</p></div>

            <div id="resultArea" class="hidden space-y-4">
                <div class="perf-badge"><i class="fas fa-bolt"></i> <span id="complexityText">Calculating...</span></div>

                <div class="glass-pro p-4 border-r-4 border-emerald-500 shadow-lg"><h4 class="text-[9px] font-black text-emerald-400 mb-1 uppercase" data-i18n="analysis_title">تحليل AETHER</h4><p id="expText" class="text-[11px] leading-relaxed font-medium text-slate-200"></p></div>
                
                <button onclick="generatePDF()" class="btn-interact w-full bg-emerald-600/10 border border-emerald-500/20 py-2 rounded-xl text-[10px] font-bold text-emerald-400">📄 تحميل الكود (PDF)</button>

                <div class="diff-container shadow-lg">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label text-[8px] opacity-50">Original</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label text-[8px] flex justify-between opacity-50">Fixed <button onclick="copyCode()" class="text-blue-400">نسخ</button></div><pre id="preCode"><code></code></pre></div>
                </div>

                <div class="glass-pro p-4 border border-blue-500/10">
                    <span class="text-[9px] font-bold text-slate-400 uppercase block mb-2" data-i18n="follow_lbl">📝 لـسـة عـايـز تـعـديلات؟</span>
                    <div class="flex gap-2">
                        <input id="followUpInput" type="text" class="flex-1 bg-[#05070a] border border-slate-800 rounded-lg px-3 py-2 text-xs outline-none text-white" data-i18n-ph="ph_follow">
                        <button onclick="runDebugger(true)" class="btn-interact bg-slate-800 px-4 rounded-lg text-[10px] font-bold text-white">تحديث 🔄</button>
                    </div>
                </div>

                <div id="feedbackBox" class="glass-pro p-4 text-center">
                    <div class="flex justify-center gap-10">
                        <i onclick="setRating('good')" class="fas fa-thumbs-up text-2xl feedback-icon text-emerald-500" id="rateGood"></i>
                        <i onclick="setRating('bad')" class="fas fa-thumbs-down text-2xl feedback-icon text-red-500" id="rateBad"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "محلل الأكواد جراحي", editor: "محرر الأكواد", btn: "تحليل ومعالجة ⚡", placeholder: "بانتظار الأكواد للتحليل...", loading: "استحضار الذكاء... ✨", ph_inq: "ما هو هدفك البرمجي؟", analysis_title: "تحليل AETHER", error_lbl: "رسالة الخطأ (اختياري)", ph_follow: "اطلب أي تعديل إضافي هنا...", follow_lbl: "📝 لـسـة عـايـز تـعـديلات؟" },
            en: { subtitle: "Surgical AI Debugger", editor: "CODE EDITOR", btn: "Aether Fix ⚡", placeholder: "Waiting for code...", loading: "Summoning Aether... ✨", ph_inq: "What's the goal?", analysis_title: "AETHER ANALYSIS", error_lbl: "Error Log (Optional)", ph_follow: "Type instructions...", follow_lbl: "📝 NEED EDITS?" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value; const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('followUpInput').placeholder = t.ph_follow;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        // 🔥 Logic: Local History 🔥
        const HISTORY_KEY = "aether_master_v2";
        function saveToHistory(data) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
            history.unshift({ time: new Date().toLocaleTimeString(), ...data });
            if (history.length > 5) history.pop();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
            container.innerHTML = history.map((item, i) => `<div class="history-pill" onclick="loadHistoryItem(${i})"><i class="fas fa-history mr-1 opacity-50"></i> ${item.time} - ${item.lang}</div>`).join('');
        }

        function loadHistoryItem(i) {
            const item = JSON.parse(localStorage.getItem(HISTORY_KEY))[i];
            updateUI(item);
        }

        function updateUI(data) {
            document.getElementById('expText').innerText = data.explanation;
            document.getElementById('complexityText').innerText = data.complexity || "N/A";
            document.getElementById('oldCode').innerText = data.oldCode;
            const pre = document.getElementById('preCode');
            pre.innerHTML = `<code class="language-python">${data.result}</code>`;
            Prism.highlightElement(pre.querySelector('code'));
            Prism.highlightElement(document.getElementById('oldCode'));
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
        }

        async function runDebugger(isFollowUp = false) {
            const code = isFollowUp ? document.querySelector('#preCode code').innerText : document.getElementById('codeInput').value;
            const followUp = isFollowUp ? document.getElementById('followUpInput').value : null;
            document.getElementById('loader').classList.remove('hidden');
            if(!isFollowUp) { document.getElementById('resultArea').classList.add('hidden'); document.getElementById('placeholder').classList.add('hidden'); }
            
            const fd = new FormData();
            fd.append('code', code); fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', document.getElementById('inquiryInput').value);
            if(followUp) fd.append('follow_up', followUp);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                let data = await res.json();
                if (typeof data === 'string') data = JSON.parse(data);
                
                const uiData = { explanation: data.explanation, result: data.result, oldCode: document.getElementById('codeInput').value, complexity: data.complexity, lang: document.getElementById('progLang').value };
                updateUI(uiData);
                saveToHistory(uiData);
                document.getElementById('loader').classList.add('hidden');
                if(isFollowUp) document.getElementById('followUpInput').value = "";
            } catch (e) { document.getElementById('loader').classList.add('hidden'); }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const code = document.querySelector('#preCode code').innerText;
            doc.setFillColor(20, 25, 35); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(88, 166, 255); doc.text("AetherCode Solution", 20, 30);
            doc.setTextColor(200, 200, 200); doc.setFontSize(9);
            doc.text(doc.splitTextToSize(code, 170), 20, 50);
            doc.save(`Aether_Fix.pdf`);
        }

        function setRating(rate) {
            const resultNode = document.getElementById('resultNode');
            const good = document.getElementById('rateGood'), bad = document.getElementById('rateBad');
            if(rate === 'good') { anime({ targets: resultNode, translateY: -15, duration: 500 }); good.classList.add('active'); bad.classList.remove('active'); }
            else { anime({ targets: resultNode, translateY: 15, duration: 500 }); bad.classList.add('active'); good.classList.remove('active'); }
        }

        function copyCode() { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("Copied! ✅"); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
        
        window.onload = () => {
            renderHistory();
            const container = document.getElementById('glassParticles');
            for(let i=0; i<8; i++) {
                const p = document.createElement('div'); p.className = 'ethereal-particle';
                p.style.width = Math.random()*200+100+'px'; p.style.height = p.style.width;
                p.style.left = Math.random()*100+'vw'; p.style.top = Math.random()*100+'vh';
                container.appendChild(p);
                anime({ targets: p, translateX: () => anime.random(-30, 30), translateY: () => anime.random(-30, 30), duration: () => anime.random(3000, 6000), loop: true, direction: 'alternate', easing: 'easeInOutSine' });
            }
        };
    </script>
</body>
</html>
