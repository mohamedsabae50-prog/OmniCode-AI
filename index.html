<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCode AI | Code Transformer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at center, #0d1117 0%, #01040a 100%);
            color: #e6edf3; font-family: 'Segoe UI', sans-serif; transition: 0.4s; min-height: 100vh;
        }
        .glass-pro { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 2.5rem; }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.8rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(88,166,255,0.1); border-radius: 1.5rem; overflow: hidden; direction: ltr; margin-top: 15px; }
        .diff-box { background: #0d1117; padding: 20px; overflow-y: auto; min-height: 350px; max-height: 700px; }
        pre { white-space: pre-wrap !important; word-break: break-all; font-size: 13px !important; line-height: 1.6; margin: 0 !important; }
        .btn-interact { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .btn-interact:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); }
        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%); filter: blur(35px); pointer-events: none; }
    </style>
</head>
<body class="p-4 md:p-10 rtl">
    <div class="glass-background-elements fixed inset-0 -z-10" id="glassParticles"></div>

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 p-8 glass-pro shadow-2xl gap-6">
        <div class="flex items-center gap-6">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-4xl font-black italic text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[11px] text-slate-400 uppercase tracking-widest italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-4">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3 text-xs font-bold text-white outline-none">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-2xl px-5 py-3 text-xs font-bold text-white outline-none">
                <optgroup label="Languages"><option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option><option value="Java">Java</option><option value="C++">C++</option></optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12">
        <div class="space-y-8">
            <div class="glass-pro p-10">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[12px] font-bold text-slate-400 uppercase tracking-widest" data-i18n="editor">محرر الأكواد ذكي</span>
                    <button onclick="pasteToCode()" class="text-emerald-400 font-bold text-xs">📋 لصق</button>
                </div>
                <textarea id="codeInput" class="w-full h-80 bg-[#05070a] border border-slate-800 rounded-[2rem] p-8 text-sm outline-none font-mono mb-6 text-blue-300" style="direction: ltr; text-align: left;" placeholder="🔙 ضـع كـودك هـنـا"></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="runDebugger('debug')" class="btn-interact bg-blue-600 hover:bg-blue-500 py-5 rounded-[2rem] font-black text-white shadow-xl"><span data-i18n="btn">تصحيح ذكي ⚡</span></button>
                    <button onclick="runDebugger('transform')" class="btn-interact bg-emerald-600 hover:bg-emerald-500 py-5 rounded-[2rem] font-black text-white shadow-xl"><span data-i18n="btn_trans">تحويل اللغة 🔄</span></button>
                </div>
            </div>
        </div>

        <div class="space-y-8 relative min-h-[600px]" id="resultNode">
            <div id="loader" class="hidden glass-pro rounded-[3rem] absolute inset-0 flex flex-col items-center justify-center p-20 z-50"><i class="fas fa-atom fa-spin text-6xl text-blue-500 mb-8"></i><p class="animate-pulse text-xl font-bold text-blue-400" data-i18n="loading">يتم استحضار الذكاء الأثيري... ✨</p></div>
            <div id="placeholder" class="glass-pro h-full flex flex-col items-center justify-center text-slate-600 border-dashed border-2 border-slate-800"><p class="text-lg italic" data-i18n="placeholder">بانتظار الأكواد للتحليل...</p></div>

            <div id="resultArea" class="hidden space-y-8">
                <div class="glass-pro p-8 border-r-8 border-emerald-500 shadow-xl"><h4 class="text-[12px] font-black text-emerald-400 mb-3 uppercase tracking-widest" data-i18n="analysis_title">تحليل ذكاء AETHER</h4><p id="expText" class="text-sm leading-relaxed text-slate-200"></p></div>
                <div class="diff-container shadow-2xl">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label">Original</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label flex justify-between">Result <button onclick="copyCode()" class="text-blue-400"><i class="fas fa-copy"></i></button></div><pre id="preCode"><code></code></pre></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { editor: "محرر الأكواد ذكي", btn: "تصحيح ذكي ⚡", btn_trans: "تحويل اللغة 🔄", placeholder: "بانتظار الأكواد...", loading: "يتم استحضار الذكاء الأثيري... ✨", analysis_title: "تحليل ذكاء AETHER" },
            en: { editor: "SMART EDITOR", btn: "Surgical Fix ⚡", btn_trans: "Transform 🔄", placeholder: "Waiting for code...", loading: "Summoning Aether... ✨", analysis_title: "AETHER ANALYSIS" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value; const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        async function runDebugger(mode = 'debug') {
            const code = document.getElementById('codeInput').value;
            const lang = document.getElementById('progLang').value;
            document.getElementById('loader').classList.remove('hidden');
            
            const fd = new FormData();
            fd.append('code', code); fd.append('lang', lang);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('mode', mode); // نبعت الـ mode للسيرفر

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                let data = await res.json();
                if (typeof data === 'string') data = JSON.parse(data);
                
                document.getElementById('expText').innerText = data.explanation;
                document.getElementById('oldCode').innerText = code;
                const pre = document.getElementById('preCode');
                pre.innerHTML = `<code class="language-${lang.toLowerCase()}">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                
                Prism.highlightElement(pre.querySelector('code'));
                document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            } catch (e) { document.getElementById('loader').classList.add('hidden'); }
        }

        function copyCode() { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("تم النسخ ✅"); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
    </script>
</body>
</html>
