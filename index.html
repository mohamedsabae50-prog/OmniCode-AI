<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .editor-box { background: #0a0e17; border: 1px solid #21262d; border-radius: 1rem; }
        textarea { font-size: 16px !important; } 
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .code-container { background: #0d1117; border-radius: 1.5rem; border: 1px solid #30363d; overflow: hidden; }
        pre { padding: 1.25rem !important; margin: 0 !important; font-size: 13px !important; line-height: 1.6; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 rtl" id="mainContainer">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 p-6 glass rounded-[2.5rem] shadow-2xl gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-3xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span id="lblSubTitle" class="text-[10px] text-slate-400 uppercase tracking-widest italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3 items-center w-full md:w-auto">
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer hover:border-blue-500 transition">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer hover:border-blue-500 transition">
                <optgroup label="الأكثر استخداماً">
                    <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="Java">Java</option><option value="C++">C++</option><option value="C#">C#</option>
                </optgroup>
                <optgroup label="تطوير الخلفية والقواعد">
                    <option value="SQL">SQL</option><option value="Go">Go</option><option value="PHP">PHP</option>
                </optgroup>
                <optgroup label="الأنظمة والحديثة">
                    <option value="Rust">Rust</option><option value="Swift">Swift</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        
        <div class="space-y-6">
            <div class="glass p-6 md:p-8 rounded-[3rem] shadow-xl border border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <span id="lblEditor" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-4">
                        <button onclick="pasteToCode()" class="text-[11px] text-emerald-400 font-bold hover:text-white transition flex items-center gap-1">
                            <i class="fas fa-paste"></i> <span id="lblPaste" data-i18n="paste">لصق</span>
                        </button>
                        <label class="text-[11px] text-blue-400 font-bold cursor-pointer hover:text-white transition flex items-center gap-1">
                            <i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span id="lblUpload" data-i18n="upload">رفع ملف</span>
                        </label>
                    </div>
                </div>
                
                <textarea id="codeInput" class="w-full h-64 md:h-80 editor-box p-6 text-sm text-blue-300 outline-none resize-none font-mono mb-6 border border-slate-800 focus:border-blue-500/50 transition shadow-inner" placeholder="..."></textarea>
                
                <div class="space-y-4">
                    <div>
                        <span id="lblError" class="text-[10px] font-bold text-slate-500 uppercase block mb-2" data-i18n="error">رسالة الخطأ (اختياري)</span>
                        <textarea id="errorInput" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs text-red-400 outline-none resize-none focus:border-red-500/30 transition" placeholder="..."></textarea>
                    </div>
                    
                    <div class="relative">
                        <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none focus:border-blue-500 transition shadow-lg" data-i18n-ph="ph_inq">
                    </div>
                </div>
                
                <button onclick="runDebugger()" id="runBtn" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg shadow-xl transition-all active:scale-[0.98] text-white flex items-center justify-center gap-2">
                    <span id="lblBtn" data-i18n="btn">تصحيح وتحويل ذكي ⚡</span>
                </button>
            </div>
        </div>

        <div class="relative min-h-[500px]">
            <div id="loader" class="hidden glass absolute inset-0 rounded-[3rem] flex flex-col items-center justify-center p-12 text-center z-10">
                <i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i>
                <p id="lblLoading" class="text-sm font-bold tracking-widest animate-pulse text-blue-200" data-i18n="loading">جاري تحليل المنطق...</p>
            </div>
            
            <div id="placeholder" class="glass h-full rounded-[3rem] flex flex-col items-center justify-center text-slate-600 p-12 text-center border border-dashed border-white/5">
                <i class="fas fa-code-branch text-6xl mb-6 opacity-20"></i>
                <p id="lblPlaceholder" class="text-sm font-medium italic" data-i18n="placeholder">التحليل والحل سيظهر هنا.</p>
            </div>

            <div id="resultArea" class="hidden space-y-6 animate-in fade-in duration-500">
                <div class="glass p-6 md:p-8 rounded-[2rem] border-r-8 border-emerald-500 shadow-2xl">
                    <h4 id="lblAnalysisTitle" class="text-[11px] font-black text-emerald-400 mb-3 uppercase tracking-widest flex items-center gap-2" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed text-slate-200 font-medium"></p>
                </div>
                <div class="code-container shadow-2xl">
                    <div class="code-header bg-[#161b22] px-5 py-3 flex justify-between items-center border-b border-white/5">
                        <span id="langLabel" class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Corrected Code</span>
                        <button onclick="copyCode()" id="lblCopy" class="text-blue-400 hover:text-white text-xs font-black transition flex items-center gap-1" data-i18n="copy">نسخ 📋</button>
                    </div>
                    <pre id="preCode"><code></code></pre>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي بالذكاء الاصطناعي العالمي", editor: "محرر الكود", upload: "رفع ملف", error: "رسالة الخطأ (اختياري)", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل والحل سيظهر هنا بتنسيق احترافي.", loading: "جاري تحليل المنطق...", ph_code: "ضع كود أي لغة هنا...", ph_err: "انسخ الخطأ هنا...", ph_inq: "عايز تعمل إيه بالكود؟", copy: "نسخ 📋", paste: "لصق", analysis_title: "تحليل ذكاء AETHER" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", upload: "Upload File", error: "Error Log (Optional)", btn: "Aether Debug ⚡", placeholder: "Analysis will appear here.", loading: "AI thinking...", ph_code: "Paste code here...", ph_err: "Paste error here...", ph_inq: "What's the goal?", copy: "COPY 📋", paste: "Paste", analysis_title: "AETHER CORTEX ANALYSIS" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value;
            const t = i18n[lang] || i18n['en'];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('codeInput').placeholder = t.ph_code;
            document.getElementById('errorInput').placeholder = t.ph_err;
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('mainContainer').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        async function pasteToCode() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) document.getElementById('codeInput').value = text;
            } catch (err) { alert("Clipboard permission error!"); }
        }

        async function runDebugger() {
            const code = document.getElementById('codeInput').value;
            const inquiry = document.getElementById('inquiryInput').value;
            const uiLang = document.getElementById('uiLang').value;
            
            if(!code && !inquiry) return alert(uiLang === 'ar' ? "اكتب حاجة يا هندسة!" : "Write something first!");

            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const placeholder = document.getElementById('placeholder');
            const runBtn = document.getElementById('runBtn');
            
            runBtn.disabled = true;
            loader.classList.remove('hidden'); 
            placeholder.classList.add('hidden'); 
            resArea.classList.add('hidden');

            const fd = new FormData();
            fd.append('code', code || "");
            fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', uiLang);
            fd.append('inquiry', inquiry);
            fd.append('error_log', document.getElementById('errorInput').value);

            try {
                const response = await fetch('/api/index', { method: 'POST', body: fd });
                if (!response.ok) throw new Error("Server Error");
                
                const data = await response.json();
                document.getElementById('expText').innerText = data.explanation || "Done.";
                
                const pre = document.getElementById('preCode');
                const selectedLang = document.getElementById('progLang').value.toLowerCase();
                pre.innerHTML = `<code class="language-${selectedLang}">${(data.result || "No code").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                
                setTimeout(() => {
                    Prism.highlightElement(pre.querySelector('code'));
                    loader.classList.add('hidden'); resArea.classList.remove('hidden');
                    runBtn.disabled = false;
                }, 100);

            } catch (e) {
                alert(uiLang === 'ar' ? "عذراً، حدث خطأ في السيرفر." : "Server error, please try again.");
                loader.classList.add('hidden'); placeholder.classList.remove('hidden');
                runBtn.disabled = false;
            }
        }

        function copyCode() {
            const code = document.querySelector('#preCode code').textContent;
            navigator.clipboard.writeText(code);
            alert("Copied! ✅");
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('codeInput').value = reader.result;
            reader.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
