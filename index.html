<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #01040a 0%, #0d1117 40%, #01040a 100%);
            color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; position: relative;
        }
        .glass-background-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .ethereal-particle {
            position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.15) 0%, rgba(13, 17, 23, 0) 70%);
            filter: blur(20px); animation: floatParticle 25s infinite linear; opacity: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .glass-pro { 
            background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255,255,255,0.06); border-radius: 2.5rem; 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .editor-box { background: #0a0e17; border: 1px solid #21262d; border-radius: 1.25rem; direction: ltr !important; text-align: left !important; color: #58a6ff; }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* نظام المقارنة: Split View المفرود */
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #30363d; border-radius: 1.5rem; overflow: hidden; direction: ltr; margin-top: 15px; }
        .diff-box { background: #0d1117; padding: 20px; overflow-x: auto; height: auto; min-height: 300px; }
        .diff-label { font-size: 10px; font-weight: bold; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #21262d; padding-bottom: 5px; }
        pre { white-space: pre !important; font-size: 13px !important; line-height: 1.6; margin: 0 !important; }
        
        .btn-interact { transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; cursor: pointer; }
        .btn-interact:active { transform: scale(0.92); }
        .emoji-pop { position: absolute; pointer-events: none; animation: popUp 0.8s forwards; font-size: 1.8rem; top: -20px; left: 50%; transform: translateX(-50%); }
        @keyframes popUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50px) scale(1.3); opacity: 0; } }
        .result-panel-float { transform: translateY(-30px); }
        .result-panel-sink { transform: translateY(30px); }
        .feedback-btn { transition: 0.3s; opacity: 0.4; cursor: pointer; }
        .feedback-btn:hover, .feedback-btn.active { opacity: 1; transform: scale(1.3); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 rtl">

    <div class="glass-background-elements" id="glassParticles"></div>

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 p-6 glass-pro shadow-2xl gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-3xl font-black italic tracking-tighter text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[10px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3 items-center w-full md:w-auto">
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none text-white">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none text-white">
                <optgroup label="الاكثر استخداماً">
                    <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option><option value="Java">Java</option><option value="C++">C++</option>
                </optgroup>
                <optgroup label="لغات أخرى">
                    <option value="C#">C#</option><option value="SQL">SQL</option><option value="Go">Go</option><option value="PHP">PHP</option><option value="Rust">Rust</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <div class="space-y-6">
            <div class="glass-pro p-6 md:p-8 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-5">
                        <button onclick="animateBtn(this, '📋'); pasteToCode()" class="btn-interact text-[11px] text-emerald-500 font-bold flex items-center gap-1"><i class="fas fa-paste"></i> <span data-i18n="paste">لصق</span></button>
                        <label class="btn-interact text-[11px] text-blue-500 font-bold cursor-pointer flex items-center gap-1"><i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span data-i18n="upload">رفع ملف</span></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-72 editor-box p-6 text-sm outline-none resize-none font-mono mb-4 border border-slate-800 focus:border-blue-500 transition shadow-inner" placeholder="..."></textarea>
                <textarea id="errorInput" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs text-red-400 outline-none resize-none mb-4" placeholder="Terminal Error Log..."></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-6 focus:border-blue-500 transition shadow-lg text-white" data-i18n-ph="ph_inq">
                <button onclick="animateBtn(this, '🚀'); runDebugger()" id="runBtn" class="btn-interact w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl"><span data-i18n="btn">تصحيح وتحويل ذكي ⚡</span></button>
            </div>
        </div>

        <div class="space-y-6 relative min-h-[500px]" id="resultContainer">
            <div id="loader" class="hidden glass-pro absolute inset-0 flex flex-col items-center justify-center p-12 text-center z-10"><i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i><p class="text-sm font-bold animate-pulse text-blue-400" data-i18n="loading">جاري تحليل المنطق جراحياً...</p></div>
            <div id="placeholder" class="glass-pro h-full min-h-[500px] flex flex-col items-center justify-center text-slate-500 p-12 text-center border border-dashed border-slate-800"><i class="fas fa-code-branch text-6xl mb-6 opacity-10"></i><p class="text-sm italic" data-i18n="placeholder">التحليل والحل سيظهر هنا.</p></div>

            <div id="resultArea" class="hidden space-y-6">
                <div class="glass-pro p-6 md:p-8 border-r-8 border-emerald-500 shadow-2xl">
                    <h4 class="text-[11px] font-black text-emerald-400 mb-3 uppercase tracking-widest" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed font-medium"></p>
                </div>
                
                <div class="diff-container shadow-2xl">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label">Original (القديم)</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label flex justify-between">Fixed (المعدل) <button onclick="animateBtn(this, '✨'); copyCode()" class="text-blue-500 hover:text-white transition"><i class="fas fa-copy"></i> <span id="copyTxt" data-i18n="copy">نسخ</span></button></div><pre id="preCode"><code></code></pre></div>
                </div>
                
                <div id="feedbackBox" class="glass-pro p-6 text-center border border-white/5">
                    <p class="text-xs font-bold opacity-50 mb-4" data-i18n="feedback_q">هل النتيجة مرضية؟</p>
                    <div class="flex justify-center gap-10">
                        <i onclick="animateBtn(this, '💚'); setRating('good')" class="fas fa-thumbs-up text-3xl feedback-btn text-emerald-500" id="rateGood"></i>
                        <i onclick="animateBtn(this, '💔'); setRating('bad')" class="fas fa-thumbs-down text-3xl feedback-btn text-red-500" id="rateBad"></i>
                    </div>
                </div>
                <div id="followUpBox" class="glass-pro p-6 text-right border border-blue-500/10">
                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-3" data-i18n="follow_lbl">📝 لـسـة عـايـز تـعـديلات؟ (اكتبها هنا...)</span>
                    <input id="followUpInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-4 focus:border-blue-500 transition shadow-lg text-white" data-i18n-ph="ph_follow">
                    <button onclick="animateBtn(this, '🔄'); runFollowUpEdits()" id="followBtn" class="btn-interact w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold transition text-white"><span data-i18n="btn_follow">تحديث الكود 🔄</span></button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي عالمي", editor: "محرر الكود", upload: "رفع ملف", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل والحل سيظهر هنا للمقارنة.", loading: "جاري تحليل المنطق جراحياً...", ph_code: "🔙 ضـع كـودك هـنـا (Ctrl+V)", ph_inq: "عايز تعمل إيه بالكود؟", ph_error: "أدخل رسالة الخطأ هنا (اختياري)...", copy: "نسخ", copied: "تم النسخ 😊", paste: "لصق", analysis_title: "تحليل ذكاء AETHER", corrected_lbl: "الكود المصحح", feedback_q: "هل النتيجة مرضية؟", follow_lbl: "📝 لـسـة عـايـز تـعـديلات؟", ph_follow: "اكتب طلبك الإضافي هنا...", btn_follow: "تحديث الكود 🔄" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", upload: "Upload", btn: "Aether Debug ⚡", placeholder: "Results will appear here.", loading: "Surgical Analysis...", ph_code: "🔙 Paste code here...", ph_inq: "Goal?", ph_error: "Paste error log here (optional)...", copy: "COPY", copied: "Copied 😊", paste: "Paste", analysis_title: "AETHER ANALYSIS", corrected_lbl: "Corrected Code", feedback_q: "Satisfied?", follow_lbl: "📝 NEED EDITS?", ph_follow: "Type additional requests...", btn_follow: "Update Code 🔄" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value; const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('codeInput').placeholder = t.ph_code;
            document.getElementById('errorInput').placeholder = t.ph_error;
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('followUpInput').placeholder = t.ph_follow;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        function animateBtn(btn, emoji) { const pop = document.createElement('span'); pop.className = 'emoji-pop'; pop.innerText = emoji; btn.appendChild(pop); setTimeout(() => pop.remove(), 800); }

        function initGlassParticles() {
            const container = document.getElementById('glassParticles');
            for(let i=0; i<15; i++) {
                const particle = document.createElement('div'); particle.className = 'ethereal-particle';
                particle.style.width = Math.random() * 300 + 100 + 'px'; particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + 'vw'; particle.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(particle);
            }
        }
        initGlassParticles();

        async function runDebugger(isFollowUp = false) {
            const code = document.getElementById('codeInput').value; const inquiry = document.getElementById('inquiryInput').value;
            const error = document.getElementById('errorInput').value; const followUp = isFollowUp ? document.getElementById('followUpInput').value : null;
            document.getElementById('loader').classList.remove('hidden');
            if(!isFollowUp) { document.getElementById('resultArea').classList.add('hidden'); document.getElementById('placeholder').classList.add('hidden'); }
            document.getElementById('resultContainer').classList.remove('result-panel-float', 'result-panel-sink');
            const fd = new FormData(); fd.append('code', code); fd.append('lang', document.getElementById('progLang').value); fd.append('ui_lang', document.getElementById('uiLang').value); fd.append('inquiry', inquiry); fd.append('error_log', error);
            if(followUp) fd.append('follow_up', followUp);
            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd }); const data = await res.json();
                document.getElementById('expText').innerText = data.explanation; document.getElementById('oldCode').innerText = code;
                const pre = document.getElementById('preCode');
                const selectedLang = document.getElementById('progLang').value.toLowerCase();
                pre.innerHTML = `<code class="language-${selectedLang}">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                Prism.highlightElement(pre.querySelector('code')); Prism.highlightElement(document.getElementById('oldCode'));
                document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) { alert("Error!"); document.getElementById('loader').classList.add('hidden'); }
        }

        async function runFollowUpEdits() { await runDebugger(true); }
        function setRating(rate) {
            const container = document.getElementById('resultContainer');
            if (rate === 'good') { container.classList.add('result-panel-float'); container.classList.remove('result-panel-sink'); }
            else { container.classList.add('result-panel-sink'); container.classList.remove('result-panel-float'); }
        }
        function copyCode() { const t = i18n[document.getElementById('uiLang').value]; navigator.clipboard.writeText(document.querySelector('#preCode code').textContent).then(() => { const txt = document.getElementById('copyTxt'); txt.innerText = t.copied; setTimeout(() => { txt.innerText = t.copy; }, 2500); }); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
    </script>
</body>
</html>
