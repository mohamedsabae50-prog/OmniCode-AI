<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCode AI | Pro Analytics v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: radial-gradient(circle at center, #0d1117 0%, #01040a 100%); color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; font-size: 13px; overflow-x: hidden; }
        .glass-pro { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 1.2rem; }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(88,166,255,0.05); border-radius: 1rem; overflow: hidden; direction: ltr; margin-top: 10px; }
        .diff-box { background: #0d1117; padding: 15px; overflow: auto; min-height: 200px; max-height: 400px; }
        pre { white-space: pre-wrap !important; word-break: break-all; font-size: 11px !important; line-height: 1.5; margin: 0 !important; }
        
        .interaction-pop { position: fixed; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 9999; }
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50px) scale(1.5); opacity: 0; } }

        /* 🔥 مؤشر السرعة المتوهج 🔥 */
        .perf-badge { 
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,165,0,0.05) 100%); 
            border: 1px solid rgba(255,215,0,0.3); 
            color: #ffd700; padding: 5px 12px; border-radius: 10px; 
            font-size: 10px; display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
            animation: pulseGlow 3s infinite alternate;
        }
        @keyframes pulseGlow { from { opacity: 0.8; } to { opacity: 1; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); } }

        .reveal-node { opacity: 0; transform: translateY(20px); }
        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%); filter: blur(30px); pointer-events: none; }
    </style>
</head>
<body class="p-2 md:p-4 rtl">
    <div id="glassParticles" class="fixed inset-0 -z-10"></div>

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-5 p-4 glass-pro shadow-xl gap-4 reveal-node">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[8px] text-slate-400 uppercase tracking-widest italic">Precision AI Debugging</span>
            </div>
        </div>
        <div class="flex gap-3">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-[10px] font-bold text-white outline-none">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-[10px] font-bold text-white outline-none">
                <option value="Python">Python</option><option value="JavaScript">JavaScript</option>
                <option value="HTML">HTML</option><option value="Java">Java</option>
            </select>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-5 items-start">
        <div class="space-y-5 reveal-node">
            <div class="glass-pro p-5">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">محرر الأكواد ذكي</span>
                    <div class="flex gap-4">
                        <button onclick="handleAction(this, '📋', 'paste')" class="text-emerald-400 font-bold text-[10px] flex items-center gap-1">📋 لصق</button>
                        <label class="text-blue-400 font-bold text-[10px] flex items-center gap-1 cursor-pointer">📁 ملف<input type="file" class="hidden" onchange="handleAction(this, '📁', 'file')"></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-56 bg-[#05070a] border border-slate-800 rounded-xl p-4 text-xs outline-none font-mono mb-4 text-blue-300" style="direction: ltr; text-align: left;"></textarea>
                <textarea id="errorInput" class="w-full h-16 bg-[#05070a] border border-slate-800 rounded-xl p-3 text-[10px] text-red-400 outline-none mb-3" placeholder="أدخل رسالة الخطأ هنا..."></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-3 text-xs outline-none mb-4 text-white" placeholder="ما هو هدفك البرمجي؟">
                <button onclick="handleAction(this, '🚀', 'run')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-xs text-white shadow-xl">تحليل ومعالجة جراحية ⚡</button>
            </div>
        </div>

        <div class="space-y-5 relative min-h-[500px] reveal-node" id="resultNode">
            <div id="loader" class="hidden glass-pro rounded-xl absolute inset-0 flex flex-col items-center justify-center p-10 z-50"><i class="fas fa-atom fa-spin text-3xl text-blue-500 mb-3"></i><p class="animate-pulse text-xs font-bold text-blue-400">استحضار الذكاء الأثيري...</p></div>
            <div id="placeholder" class="glass-pro h-[500px] flex flex-col items-center justify-center text-slate-600 border-dashed border border-slate-800"><p class="text-xs italic">بانتظار الأكواد للتحليل...</p></div>

            <div id="resultArea" class="hidden space-y-4">
                <div class="perf-badge" id="badgeContainer">
                    <i class="fas fa-bolt"></i> <span id="complexityText">Time: O(1), Space: O(1)</span>
                </div>

                <div class="glass-pro p-4 border-r-4 border-emerald-500 shadow-lg"><h4 class="text-[9px] font-black text-emerald-400 mb-1 uppercase">تحليل AETHER</h4><p id="expText" class="text-[11px] leading-relaxed text-slate-200"></p></div>
                
                <button onclick="handleAction(this, '📄', 'pdf')" class="w-full bg-emerald-600/10 border border-emerald-500/30 py-2 rounded-xl text-[10px] font-bold text-emerald-400">📄 تحميل الكود المصلح مع تقرير الأداء</button>
                
                <div class="diff-container shadow-lg">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label text-[8px] opacity-50">Original</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label flex justify-between">Fixed <button onclick="handleAction(this, '✨', 'copy')" class="text-blue-400 text-[9px]">نسخ</button></div><pre id="preCode"><code></code></pre></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        // 🔥 وظيفة توليد التقرير مع مؤشر السرعة في الأعلى 🔥
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const lang = document.getElementById('progLang').value;
            const fixedCode = document.querySelector('#preCode code').innerText;
            const complexity = document.getElementById('complexityText').innerText; // سحب قيمة المؤشر
            
            // تصميم التقرير الاحترافي
            doc.setFillColor(20, 25, 35); doc.rect(0, 0, 210, 297, 'F'); 
            doc.setTextColor(88, 166, 255); doc.setFontSize(24); doc.text("AETHER CODE REPORT", 20, 30);
            
            // 🔥 وضع مؤشر السرعة في الأعلى 🔥
            doc.setFillColor(255, 215, 0, 0.1); doc.rect(20, 40, 170, 12, 'F');
            doc.setTextColor(255, 215, 0); doc.setFontSize(10);
            doc.text(`PERFORMANCE METRICS: ${complexity}`, 25, 48);
            
            doc.setTextColor(255, 255, 255); doc.setFontSize(10);
            doc.text(`Language: ${lang} | Date: ${new Date().toLocaleDateString()}`, 20, 65);

            doc.setTextColor(16, 185, 129); doc.setFontSize(14); doc.text("OPTIMIZED CODE:", 20, 80);
            
            doc.setFillColor(10, 12, 18); doc.rect(15, 85, 180, 180, 'F');
            doc.setTextColor(200, 200, 200); doc.setFontSize(8);
            const splitFixed = doc.splitTextToSize(fixedCode, 170);
            doc.text(splitFixed, 20, 95);
            
            doc.save(`Aether_Analysis_${lang}.pdf`);
        }

        // باقي وظائف التفاعل والموشن
        function handleAction(el, emoji, type) {
            anime({ targets: el, scale: [1, 0.85, 1], duration: 300, easing: 'easeOutBack' });
            const rect = el.getBoundingClientRect();
            const pop = document.createElement('span'); pop.className = 'interaction-pop'; pop.innerText = emoji;
            pop.style.left = `${rect.left + rect.width/2}px`; pop.style.top = `${rect.top}px`;
            document.body.appendChild(pop); setTimeout(() => pop.remove(), 600);

            if(type === 'paste') navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t);
            if(type === 'file') { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(el.files[0]); }
            if(type === 'run') runDebugger();
            if(type === 'copy') { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("Copied!"); }
            if(type === 'pdf') generatePDF();
        }

        async function runDebugger() {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            
            const fd = new FormData();
            fd.append('code', document.getElementById('codeInput').value);
            fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', document.getElementById('inquiryInput').value);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                let data = await res.json();
                if (typeof data === 'string') data = JSON.parse(data);
                
                // تحديث الواجهة والـ Complexity
                document.getElementById('expText').innerText = data.explanation;
                document.getElementById('complexityText').innerText = data.complexity || "Time: O(1), Space: O(1)";
                document.getElementById('oldCode').innerText = document.getElementById('codeInput').value;
                const pre = document.getElementById('preCode');
                pre.innerHTML = `<code class="language-python">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                Prism.highlightElement(pre.querySelector('code'));
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
                anime({ targets: '#resultArea', opacity: [0, 1], translateY: [20, 0], duration: 800 });
            } catch (e) { document.getElementById('loader').classList.add('hidden'); }
        }

        window.onload = () => {
            anime({ targets: '.reveal-node', translateY: [30, 0], opacity: [0, 1], delay: anime.stagger(150), easing: 'easeOutExpo' });
        };
    </script>
</body>
</html>
