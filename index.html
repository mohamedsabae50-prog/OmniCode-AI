<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCode AI | Cinematic Motion v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at center, #0d1117 0%, #01040a 100%);
            color: #e6edf3; font-family: 'Segoe UI', sans-serif; transition: 0.4s; overflow-x: hidden; position: relative; min-height: 100vh; font-size: 13px;
        }
        
        .glass-pro { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 1.5rem; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 🔥 عناصر الموشن الأساسية (opacity: 0 في البداية) 🔥 */
        .reveal-node { opacity: 0; transform: translateY(20px); }
        .reveal-node-left { opacity: 0; transform: translateX(-30px); }
        .reveal-node-right { opacity: 0; transform: translateX(30px); }

        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(88,166,255,0.05); border-radius: 1rem; overflow: hidden; direction: ltr; margin-top: 8px; }
        .diff-box { background: #0d1117; padding: 12px; overflow-y: auto; height: auto; min-height: 180px; max-height: 400px; }
        .diff-label { font-size: 9px; font-weight: bold; color: #58a6ff; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #21262d; padding-bottom: 4px; opacity: 0.7; }
        pre { white-space: pre-wrap !important; word-break: break-all; font-size: 11px !important; line-height: 1.5; margin: 0 !important; }
        
        .btn-interact { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; overflow: hidden; }
        
        /* 🔥 حركة نبض الزرار 🔥 */
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
        .pulse-btn { animation: pulseGlow 2s infinite; }

        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%); filter: blur(30px); pointer-events: none; }
    </style>
</head>
<body class="p-2 md:p-4 rtl">
    <div class="glass-background-elements fixed inset-0 -z-10" id="glassParticles"></div>

    <div class="max-w-6xl mx-auto mb-3 flex gap-2 overflow-x-auto p-1 no-scrollbar reveal-node" id="historyContainer"></div>

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-5 p-4 glass-pro shadow-xl gap-4 reveal-node" id="headerNode">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[8px] text-slate-400 uppercase tracking-widest italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-2">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-[10px] font-bold text-white outline-none">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-1 text-[10px] font-bold text-white outline-none">
                <optgroup label="الاكثر استخداماً">
                    <option value="Python">Python</option><option value="JavaScript">JavaScript</option>
                    <option value="HTML">HTML</option><option value="Java">Java</option><option value="C++">C++</option>
                </optgroup>
                <optgroup label="لغات أخرى">
                    <option value="C#">C#</option><option value="SQL">SQL</option><option value="Go">Go</option>
                    <option value="PHP">PHP</option><option value="Rust">Rust</option><option value="Swift">Swift</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-5 items-start overflow-hidden">
        <div class="space-y-6 reveal-node-left" id="inputNode">
            <div class="glass-pro p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" data-i18n="editor">محرر الأكواد</span>
                    <div class="flex gap-4">
                        <button onclick="pasteToCode()" class="text-emerald-400 text-[10px]">📋 <span data-i18n="paste">لصق</span></button>
                        <label class="text-blue-400 text-[10px] cursor-pointer">📁 <span data-i18n="upload">رفع ملف</span><input type="file" class="hidden" onchange="handleFile(this)"></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-56 bg-[#05070a] border border-slate-800 rounded-xl p-4 text-xs outline-none font-mono mb-4 text-blue-300 shadow-inner" style="direction: ltr; text-align: left;" placeholder="🔙 ضـع كـودك هـنـا"></textarea>
                
                <span class="text-[9px] font-bold text-slate-500 uppercase block mb-1 px-1" data-i18n="error_lbl">رسالة الخطأ من التيرمنال (اختياري)</span>
                <textarea id="errorInput" class="w-full h-20 bg-[#05070a] border border-slate-800 rounded-xl p-3 text-[10px] text-red-400 outline-none mb-3" style="direction: ltr; text-align: left;" data-i18n-ph="ph_error"></textarea>
                
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-xs outline-none mb-4 text-white shadow-lg" data-i18n-ph="ph_inq">
                <button onclick="runDebugger()" id="runBtn" class="btn-interact pulse-btn w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-xs text-white shadow-xl"><span data-i18n="btn">تحليل ومعالجة جراحية ⚡</span></button>
            </div>
        </div>

        <div class="space-y-6 relative min-h-[500px] reveal-node-right" id="resultNode">
            <div id="loader" class="hidden glass-pro rounded-[1.5rem] absolute inset-0 flex flex-col items-center justify-center p-10 z-50"><i class="fas fa-atom fa-spin text-3xl text-blue-500 mb-3"></i><p class="animate-pulse text-xs font-bold text-blue-400" data-i18n="loading">استحضار الذكاء... ✨</p></div>
            <div id="placeholder" class="glass-pro h-[500px] flex flex-col items-center justify-center text-slate-600 border-dashed border border-slate-800"><p class="text-sm italic" data-i18n="placeholder">بانتظار الأكواد للتحليل...</p></div>

            <div id="resultArea" class="hidden space-y-4">
                <div class="glass-pro p-5 border-r-4 border-emerald-500 shadow-lg"><h4 class="text-[10px] font-black text-emerald-400 mb-2 uppercase" data-i18n="analysis_title">تحليل AETHER</h4><p id="expText" class="text-[11px] leading-relaxed font-medium text-slate-200"></p></div>
                <button onclick="generatePDF()" class="btn-interact w-full bg-emerald-600/10 border border-emerald-500/30 py-3 rounded-xl text-[10px] font-bold text-emerald-400">📄 <span data-i18n="download_report">تحميل الكود (PDF) 📄</span></button>
                <div class="diff-container shadow-xl">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label text-[8px] opacity-50">Old</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label flex justify-between">Fixed <button onclick="copyCode()" class="text-blue-400 text-[10px]">نسخ</button></div><pre id="preCode"><code></code></pre></div>
                </div>
                <div id="followUpBox" class="glass-pro p-5"><span class="text-[9px] font-bold text-slate-400 uppercase block mb-2" data-i18n="follow_lbl">📝 لـسـة عـايـز تـعـديلات؟</span><input id="followUpInput" type="text" class="w-full bg-[#05070a] border border-slate-800 rounded-lg px-3 py-2 text-xs outline-none text-white" data-i18n-ph="ph_follow"><button onclick="runDebugger(true)" class="btn-interact bg-slate-800 px-4 rounded-lg text-[10px] font-bold text-white">تحديث 🔄</button></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "محلل الأكواد جراحي بالذكاء", editor: "محرر الأكواد", btn: "تحليل ومعالجة جراحية ⚡", placeholder: "بانتظار الأكواد للتحليل السينمائي...", loading: "استحضار الذكاء... ✨", ph_inq: "ما هو هدفك البرمجي؟", analysis_title: "تحليل AETHER", upload: "رفع ملف", paste: "لصق", error_lbl: "رسالة الخطأ من التيرمنال (اختياري)", ph_error: "...أدخل رسالة الخطأ هنا", download_report: "تحميل الكود المصلح (PDF) 📄", follow_lbl: "📝 لـسـة عـايـز تـعـديلات؟", ph_follow: "اطلب أي تعديل إضافي هنا..." },
            en: { subtitle: "Surgical AI Debugger", editor: "CODE EDITOR", btn: "Aether Fix ⚡", placeholder: "Waiting for code analysis...", loading: "Summoning Aether... ✨", ph_inq: "What's the goal?", analysis_title: "AETHER ANALYSIS", upload: "File", paste: "Paste", error_lbl: "Terminal Error (Optional)", ph_error: "Paste error here...", download_report: "Download PDF 📄", follow_lbl: "📝 NEED MORE EDITS?", ph_follow: "Type here..." }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value; const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('followUpInput').placeholder = t.ph_follow;
            document.getElementById('errorInput').placeholder = t.ph_error;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        // 🔥 الموشن الأساسي عند التحميل 🔥
        window.onload = () => {
            anime.timeline({ easing: 'easeOutExpo' })
            .add({ targets: '#headerNode', translateY: [ -50, 0 ], opacity: [0, 1], duration: 1200 })
            .add({ targets: '#historyContainer', translateY: [ -30, 0 ], opacity: [0, 1], duration: 1000 }, '-=800')
            .add({ targets: '#inputNode', translateX: [ -50, 0 ], opacity: [0, 1], duration: 1000 }, '-=800')
            .add({ targets: '#resultNode', translateX: [ 50, 0 ], opacity: [0, 1], duration: 1000 }, '-=1000');
        };

        async function runDebugger(isFollowUp = false) {
            const code = isFollowUp ? document.querySelector('#preCode code').innerText : document.getElementById('codeInput').value;
            const followUp = isFollowUp ? document.getElementById('followUpInput').value : null;
            document.getElementById('loader').classList.remove('hidden');
            if(!isFollowUp) { document.getElementById('resultArea').classList.add('hidden'); document.getElementById('placeholder').classList.add('hidden'); }
            
            const fd = new FormData();
            fd.append('code', code); fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value); fd.append('inquiry', document.getElementById('inquiryInput').value);
            fd.append('error_log', document.getElementById('errorInput').value);
            if(followUp) fd.append('follow_up', followUp);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                let data = await res.json();
                if (typeof data === 'string') data = JSON.parse(data);
                document.getElementById('expText').innerText = data.explanation;
                if(!isFollowUp) document.getElementById('oldCode').innerText = document.getElementById('codeInput').value;
                const pre = document.getElementById('preCode');
                const selectedLang = document.getElementById('progLang').value.toLowerCase();
                pre.innerHTML = `<code class="language-${selectedLang}">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                Prism.highlightElement(pre.querySelector('code')); Prism.highlightElement(document.getElementById('oldCode'));
                document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
                
                // 🔥 موشن النتيجة عند الظهور 🔥
                anime({ targets: '#resultArea', opacity: [0, 1], translateY: [20, 0], duration: 800 });
                if(isFollowUp) document.getElementById('followUpInput').value = "";
            } catch (e) { document.getElementById('loader').classList.add('hidden'); }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const fixedCode = document.querySelector('#preCode code').innerText;
            doc.setFillColor(20, 25, 35); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(88, 166, 255); doc.text("AetherCode Solution", 20, 30);
            doc.setTextColor(200, 200, 200); doc.setFontSize(9);
            const splitFixed = doc.splitTextToSize(fixedCode, 170); doc.text(splitFixed, 20, 50);
            doc.save(`Aether_Fix.pdf`);
        }

        function copyCode() { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("تم النسخ ✅"); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
        
        // Particles background motion
        const container = document.getElementById('glassParticles');
        for(let i=0; i<10; i++) {
            const p = document.createElement('div'); p.className = 'ethereal-particle';
            p.style.width = Math.random()*200+100+'px'; p.style.height = p.style.width;
            p.style.left = Math.random()*100+'vw'; p.style.top = Math.random()*100+'vh';
            container.appendChild(p);
            anime({ targets: p, translateX: () => anime.random(-30, 30), translateY: () => anime.random(-30, 30), duration: () => anime.random(3000, 6000), loop: true, direction: 'alternate', easing: 'easeInOutSine' });
        }
    </script>
</body>
</html>
