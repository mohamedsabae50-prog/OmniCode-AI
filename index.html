<style>
    /* 🔥 موشن نبض الأيقونات عند التفاعل 🔥 */
    .interaction-pop {
        position: absolute;
        pointer-events: none;
        animation: floatUp 0.6s ease-out forwards;
        font-size: 1.2rem;
        z-index: 100;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
    }

    /* 🔥 تأثير الضغط على الأزرار الصغيرة 🔥 */
    .mini-btn-action {
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .mini-btn-action:active {
        transform: scale(0.8);
        filter: brightness(1.5);
    }
</style>

<script>
    // 🔥 دالة ذكية لعمل الموشن لأي زرار 🔥
    function triggerMotion(element, emoji) {
        // تأثير الاهتزاز للزرار
        anime({
            targets: element,
            scale: [1, 0.8, 1],
            duration: 300,
            easing: 'easeInOutQuad'
        });

        // خلق الإيموجي الطائر
        const rect = element.getBoundingClientRect();
        const pop = document.createElement('span');
        pop.className = 'interaction-pop';
        pop.innerText = emoji;
        pop.style.left = `${rect.left + rect.width / 2}px`;
        pop.style.top = `${rect.top}px`;
        document.body.appendChild(pop);

        setTimeout(() => pop.remove(), 600);
    }
</script>
