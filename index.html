<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link id="prismTheme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { transition: background 0.4s ease, color 0.4s ease; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        
        /* --- Dark Mode (The Obsidian Look) --- */
        .dark body { background: #01040a; color: #e6edf3; }
        .dark .glass { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .dark .editor-box { background: #0a0e17; border: 1px solid #21262d; color: #58a6ff; }
        .dark .input-field { background: #01040a; border: 1px solid #30363d; color: #e6edf3; }

        /* --- Eye-Friendly Light Mode (The Soft Slate Look) --- */
        .light body { background: #f0f4f8; color: #1e293b; } /* لون سماوي رمادي هادي جداً */
        .light .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 40px -15px rgba(0,0,0,0.08); }
        .light .editor-box { background: #ffffff; border: 1px solid #cbd5e1; color: #2563eb !important; }
        .light .input-field { background: #ffffff; border: 1px solid #cbd5e1; color: #0f172a; }
        .light .text-slate-400 { color: #64748b; }
        
        /* --- Shared Animations & Styling --- */
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .editor-box { border-radius: 1.5rem; direction: ltr !important; text-align: left !important; transition: all 0.3s; }
        .code-container { border-radius: 1.5rem; overflow: hidden; direction: ltr !important; border: 1px solid rgba(255,255,255,0.05); }
        pre { padding: 1.5rem !important; margin: 0 !important; font-size: 13px !important; text-align: left !important; line-height: 1.7; }
        
        /* Interactive Buttons */
        .btn-interact { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .btn-interact:active { transform: scale(0.92); }
        .emoji-pop { position: absolute; pointer-events: none; animation: popUp 0.8s ease-out forwards; opacity: 0; font-size: 1.8rem; top: -20px; left: 50%; transform: translateX(-50%); }
        
        @keyframes popUp {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50px) scale(1.3); opacity: 0; }
        }

        .feedback-btn { transition: 0.3s; opacity: 0.4; cursor: pointer; }
        .feedback-btn:hover, .feedback-btn.active { opacity: 1; transform: scale(1.3); }
        .light .feedback-btn { opacity: 0.6; }
    </style>
</head>
<body class="dark min-h-screen p-4 md:p-10 rtl" id="appMain">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 p-6 glass rounded-[2.5rem] shadow-2xl gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-3xl font-black italic tracking-tighter">Aether<span class="text-blue-500 font-light">Code</span></h1>
                <span class="text-[10px] text-slate-400 uppercase tracking-widest italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3 items-center w-full md:w-auto">
            <button onclick="animateBtn(this, '🌓'); toggleTheme()" class="btn-interact bg-slate-900 light:bg-slate-200 border border-slate-700 light:border-slate-300 rounded-xl px-5 py-2 transition-all">
                <i id="themeIcon" class="fas fa-moon text-blue-400"></i>
            </button>
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 light:bg-slate-100 border border-slate-700 light:border-slate-300 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 light:bg-slate-100 border border-slate-700 light:border-slate-300 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="Java">Java</option><option value="C++">C++</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <div class="space-y-6">
            <div class="glass p-6 md:p-8 rounded-[3rem] shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-5">
                        <button onclick="animateBtn(this, '📋'); pasteToCode()" class="btn-interact text-[11px] text-emerald-500 font-bold flex items-center gap-1">
                            <i class="fas fa-paste"></i> <span data-i18n="paste">لصق</span>
                        </button>
                        <label class="btn-interact text-[11px] text-blue-500 font-bold cursor-pointer flex items-center gap-1">
                            <i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span data-i18n="upload">رفع ملف</span>
                        </label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-72 editor-box p-6 text-sm outline-none resize-none font-mono mb-6 transition-all shadow-inner" placeholder="..."></textarea>
                <div class="space-y-4">
                    <textarea id="errorInput" class="w-full h-24 input-field rounded-2xl p-4 text-xs outline-none resize-none transition-all" placeholder="Terminal error log..."></textarea>
                    <input id="inquiryInput" type="text" class="w-full input-field rounded-2xl px-5 py-4 text-sm outline-none transition-all" data-i18n-ph="ph_inq">
                </div>
                <button onclick="animateBtn(this, '🚀'); runDebugger()" id="runBtn" class="btn-interact w-full mt-6 bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl">
                    <span data-i18n="btn">تصحيح وتحويل ذكي ⚡</span>
                </button>
            </div>
        </div>

        <div class="relative min-h-[500px]">
            <div id="loader" class="hidden glass absolute inset-0 rounded-[3rem] flex flex-col items-center justify-center p-12 text-center z-10">
                <i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i>
                <p class="text-sm font-bold animate-pulse text-blue-400" data-i18n="loading">جاري تحليل المنطق جراحياً...</p>
            </div>
            
            <div id="placeholder" class="glass h-full rounded-[3rem] flex flex-col items-center justify-center text-slate-400 p-12 text-center border border-dashed border-slate-700 light:border-slate-300">
                <i class="fas fa-code-branch text-6xl mb-6 opacity-10"></i>
                <p class="text-sm italic" data-i18n="placeholder">التحليل والحل سيظهر هنا.</p>
            </div>

            <div id="resultArea" class="hidden space-y-6">
                <div class="glass p-6 md:p-8 rounded-[2rem] border-r-8 border-emerald-500 shadow-2xl">
                    <h4 class="text-[11px] font-black text-emerald-500 mb-3 uppercase tracking-widest" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed font-medium"></p>
                </div>
                <div class="code-container shadow-2xl">
                    <div class="code-header bg-slate-900 light:bg-slate-200 px-6 py-4 flex justify-between items-center border-b border-white/5">
                        <span class="text-[10px] font-bold opacity-40 uppercase tracking-widest">Corrected Output</span>
                        <button onclick="animateBtn(this, '✨'); copyCode()" id="copyBtn" class="btn-interact text-blue-500 hover:text-blue-400 text-xs font-black flex items-center gap-1">
                            <i id="copyIcon" class="fas fa-copy"></i> <span id="copyTxt" data-i18n="copy">نسخ</span>
                        </button>
                    </div>
                    <pre id="preCode"><code></code></pre>
                </div>
                
                <div id="feedbackBox" class="glass p-6 rounded-[2rem] text-center border border-white/5">
                    <p class="text-xs font-bold opacity-50 mb-4" data-i18n="feedback_q">هل النتيجة مرضية؟</p>
                    <div class="flex justify-center gap-10">
                        <i onclick="animateBtn(this, '💚'); setRating('good')" class="fas fa-thumbs-up text-3xl feedback-btn text-emerald-500"></i>
                        <i onclick="animateBtn(this, '💔'); setRating('bad')" class="fas fa-thumbs-down text-3xl feedback-btn text-red-500"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي عالمي", editor: "محرر الكود", upload: "رفع ملف", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل سيظهر هنا بتنسيق احترافي.", loading: "جاري تحليل المنطق جراحياً...", ph_inq: "عايز تعمل إيه بالكود؟", copy: "نسخ", copied: "تم النسخ 😊", paste: "لصق", analysis_title: "تحليل ذكاء AETHER", feedback_q: "هل النتيجة مرضية؟" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", upload: "Upload", btn: "Aether Debug ⚡", placeholder: "Results here.", loading: "Surgical Analysis...", ph_inq: "Goal?", copy: "COPY", copied: "Copied 😊", paste: "Paste", analysis_title: "AETHER CORTEX", feedback_q: "Satisfied?" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value;
            const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        function animateBtn(btn, emoji) {
            const pop = document.createElement('span');
            pop.className = 'emoji-pop';
            pop.innerText = emoji;
            btn.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }

        function toggleTheme() {
            const body = document.getElementById('appBody');
            const icon = document.getElementById('themeIcon');
            const prism = document.getElementById('prismTheme');
            
            if (body.classList.contains('dark')) {
                body.classList.replace('dark', 'light');
                icon.className = 'fas fa-sun text-amber-500';
                prism.href = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css';
            } else {
                body.classList.replace('light', 'dark');
                icon.className = 'fas fa-moon text-blue-400';
                prism.href = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css';
            }
        }

        async function runDebugger() {
            const code = document.getElementById('codeInput').value, inquiry = document.getElementById('inquiryInput').value;
            if(!code && !inquiry) return;
            document.getElementById('loader').classList.remove('hidden'); document.getElementById('placeholder').classList.add('hidden'); document.getElementById('resultArea').classList.add('hidden');

            const fd = new FormData();
            fd.append('code', code); fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value); fd.append('inquiry', inquiry);
            fd.append('error_log', document.getElementById('errorInput').value);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await res.json();
                document.getElementById('expText').innerText = data.explanation;
                const pre = document.getElementById('preCode');
                pre.innerHTML = `<code class="language-python">${data.result.replace(/</g, "&lt;")}</code>`;
                Prism.highlightElement(pre.querySelector('code'));
                document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) { alert("Error!"); }
        }

        function copyCode() {
            const code = document.querySelector('#preCode code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const txt = document.getElementById('copyTxt');
                const icon = document.getElementById('copyIcon');
                const t = i18n[document.getElementById('uiLang').value];
                txt.innerText = t.copied;
                icon.className = 'fas fa-check text-emerald-500';
                setTimeout(() => {
                    txt.innerText = t.copy;
                    icon.className = 'fas fa-copy text-blue-500';
                }, 2000);
            });
        }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
        function setRating(r) { alert("تم استلام تقييمك بنجاح! شكراً لك."); }
    </script>
</body>
</html>
