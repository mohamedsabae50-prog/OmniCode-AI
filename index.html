<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; position: relative; min-height: 100vh; }
        
        .glass-pro { background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2); }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 🔥 ميزة رقم 1: نظام المقارنة Diff View 🔥 */
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #30363d; border-radius: 1.5rem; overflow: hidden; direction: ltr; }
        .diff-box { background: #0d1117; padding: 15px; overflow-x: auto; height: 350px; }
        .diff-label { font-size: 10px; font-weight: bold; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        pre { white-space: pre !important; font-size: 12px !important; line-height: 1.6; margin: 0 !important; }

        /* 🔥 ميزة رقم 2: مشغل الكود (Output Window) 🔥 */
        #outputWindow { background: #000; color: #7ee787; font-family: 'Consolas', monospace; padding: 15px; border-radius: 1rem; margin-top: 15px; border: 1px solid #238636; min-height: 50px; display: none; }

        /* Animations & Particles */
        .glass-background-elements { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; }
        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88,166,255,0.1) 0%, rgba(13,17,23,0) 70%); filter: blur(30px); animation: floatParticle 30s infinite linear; }
        @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }

        .btn-interact { transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-interact:active { transform: scale(0.95); }
        .result-panel-float { transform: translateY(-20px); transition: 0.5s; }
        .result-panel-sink { transform: translateY(20px); transition: 0.5s; }
    </style>
</head>
<body class="p-4 md:p-10 rtl">
    <div class="glass-background-elements" id="glassParticles"></div>

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 p-6 glass-pro rounded-[2.5rem] gap-6 shadow-2xl">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-3xl font-black italic text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[10px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <div class="space-y-6">
            <div class="glass-pro p-8 rounded-[3rem]">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <button onclick="pasteToCode()" class="btn-interact text-emerald-500 font-bold text-xs"><i class="fas fa-paste"></i> لصق</button>
                </div>
                <textarea id="codeInput" class="w-full h-80 editor-box p-6 text-sm outline-none resize-none font-mono mb-4 border border-slate-800 focus:border-blue-500 transition" placeholder="🔙 ضـع كـودك هـنـا"></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-6 focus:border-blue-500 transition" data-i18n-ph="ph_inq">
                <button onclick="runDebugger()" id="runBtn" class="btn-interact w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl">تصحيح ذكي ⚡</button>
            </div>
        </div>

        <div class="space-y-6" id="resultContainer">
            <div id="loader" class="hidden glass-pro rounded-[3rem] flex flex-col items-center justify-center p-20 text-center"><i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i><p class="animate-pulse" data-i18n="loading">تحليل جراحي...</p></div>
            <div id="placeholder" class="glass-pro h-[500px] rounded-[3rem] flex flex-col items-center justify-center text-slate-600 border border-dashed border-slate-800"><i class="fas fa-code-branch text-6xl mb-6 opacity-10"></i><p data-i18n="placeholder">النتائج ستظهر هنا.</p></div>

            <div id="resultArea" class="hidden space-y-6 animate-in fade-in duration-500">
                <div class="glass-pro p-6 rounded-[2rem] border-r-8 border-emerald-500">
                    <h4 class="text-[11px] font-black text-emerald-400 mb-2 uppercase" data-i18n="analysis_title">تحليل AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed"></p>
                </div>

                <div class="diff-container shadow-2xl">
                    <div class="diff-box border-r border-slate-800">
                        <div class="diff-label">Original</div>
                        <pre id="oldCode"><code></code></pre>
                    </div>
                    <div class="diff-box">
                        <div class="diff-label flex justify-between">Fixed <button onclick="copyCode()" class="text-blue-400"><i class="fas fa-copy"></i></button></div>
                        <pre id="preCode"><code></code></pre>
                    </div>
                </div>

                <button onclick="executeCode()" class="btn-interact w-full bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i class="fas fa-play"></i> تشغيل الكود (Run)
                </button>
                <div id="outputWindow"></div>

                <div id="feedbackBox" class="glass-pro p-6 rounded-[2rem] text-center">
                    <p class="text-xs mb-4" data-i18n="feedback_q">هل النتيجة مرضية؟</p>
                    <div class="flex justify-center gap-10">
                        <i onclick="setRating('good')" id="rateGood" class="fas fa-thumbs-up text-3xl feedback-btn text-emerald-500"></i>
                        <i onclick="setRating('bad')" id="rateBad" class="fas fa-thumbs-down text-3xl feedback-btn text-red-500"></i>
                    </div>
                </div>

                <div id="followUpBox" class="glass-pro p-6 rounded-[2rem]">
                    <span class="text-[10px] font-bold text-slate-500 uppercase block mb-3" data-i18n="follow_lbl">تعديلات إضافية؟</span>
                    <input id="followUpInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-4 focus:border-blue-500 transition">
                    <button onclick="runFollowUpEdits()" class="btn-interact w-full bg-slate-800 py-3 rounded-xl text-xs font-bold text-white">تحديث (Update)</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي عالمي", editor: "محرر الكود", btn: "تصحيح ذكي ⚡", placeholder: "النتائج ستظهر هنا.", loading: "تحليل جراحي...", ph_inq: "عايز تعمل إيه؟", analysis_title: "تحليل ذكاء AETHER", feedback_q: "هل النتيجة مرضية؟", follow_lbl: "تعديلات إضافية؟" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", btn: "Aether Debug ⚡", placeholder: "Results here.", loading: "Surgical Analysis...", ph_inq: "Goal?", analysis_title: "AETHER ANALYSIS", feedback_q: "Satisfied?", follow_lbl: "Need more edits?" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value;
            const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        // Particle background
        const container = document.getElementById('glassParticles');
        for(let i=0; i<10; i++) {
            const p = document.createElement('div'); p.className = 'ethereal-particle';
            p.style.width = Math.random()*200+100+'px'; p.style.height = p.style.width;
            p.style.left = Math.random()*100+'vw'; p.style.animationDelay = Math.random()*15+'s';
            container.appendChild(p);
        }

        async function runDebugger(isFollowUp = false) {
            const code = document.getElementById('codeInput').value;
            const inquiry = document.getElementById('inquiryInput').value;
            const followUp = document.getElementById('followUpInput').value;

            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('outputWindow').style.display = 'none';

            const fd = new FormData();
            fd.append('code', code); fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', inquiry);
            if(isFollowUp) fd.append('follow_up', followUp);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await res.json();
                
                document.getElementById('expText').innerText = data.explanation;
                document.getElementById('oldCode').innerText = code; // Original
                
                const pre = document.getElementById('preCode');
                const selectedLang = document.getElementById('progLang').value.toLowerCase();
                pre.innerHTML = `<code class="language-${selectedLang}">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                
                Prism.highlightElement(pre.querySelector('code'));
                Prism.highlightElement(document.getElementById('oldCode'));
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (e) { alert("Error!"); }
        }

        function runFollowUpEdits() { runDebugger(true); }

        // 🔥 ميزة رقم 2: JavaScript Runner 🔥
        function executeCode() {
            const code = document.querySelector('#preCode code').textContent;
            const lang = document.getElementById('progLang').value;
            const out = document.getElementById('outputWindow');
            out.style.display = 'block';
            out.innerHTML = "Executing...<br>";

            if (lang === "JavaScript") {
                try {
                    const originalLog = console.log;
                    console.log = (msg) => { out.innerHTML += `> ${msg}<br>`; };
                    eval(code);
                    console.log = originalLog;
                } catch (err) { out.innerHTML += `<span style="color:red">Error: ${err}</span>`; }
            } else {
                out.innerHTML += "Run is currently supported for JavaScript. Python/HTML runners are in progress!";
            }
        }

        function setRating(rate) {
            const container = document.getElementById('resultContainer');
            if (rate === 'good') container.className = "space-y-6 result-panel-float";
            else container.className = "space-y-6 result-panel-sink";
            alert("شكراً لتقييمك!");
        }

        function copyCode() { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("Copied! ✅"); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
    </script>
</body>
</html>
