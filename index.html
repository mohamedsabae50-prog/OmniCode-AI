<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link id="prismTheme" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        
        /* Dark Mode Colors */
        .dark body { background: #01040a; color: #e6edf3; }
        .dark .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .dark .editor-box { background: #0a0e17; border: 1px solid #21262d; }
        .dark .code-container { background: #0d1117; border: 1px solid #30363d; }
        .dark .input-border { border-color: #30363d; }

        /* Light Mode Colors */
        .light body { background: #f1f5f9; color: #0f172a; }
        .light .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(15, 23, 42, 0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .light .editor-box { background: #ffffff; border: 1px solid #e2e8f0; color: #0f172a !important; }
        .light .code-container { background: #f8fafc; border: 1px solid #e2e8f0; }
        .light .input-border { border-color: #cbd5e1; }
        .light textarea::placeholder { color: #94a3b8; }
        .light #subTitle, .light #progLang, .light #uiLang, .light #editorLabel { color: #475569 !important; }
        
        /* Common styling */
        .editor-box { border-radius: 1rem; direction: ltr !important; text-align: left !important; }
        textarea { font-size: 16px !important; } 
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .code-container { border-radius: 1.5rem; overflow: hidden; direction: ltr !important; }
        pre { padding: 1.25rem !important; margin: 0 !important; font-size: 13px !important; text-align: left !important; line-height: 1.6; }
        .feedback-btn { transition: 0.2s; cursor: pointer; opacity: 0.5; }
        .feedback-btn:hover, .feedback-btn.active { opacity: 1; transform: scale(1.1); }
        
        /* Copy Button Success State */
        .dark #lblCopy.success { color: #34d399; }
        .light #lblCopy.success { color: #059669; }
    </style>
</head>
<body class="dark min-h-screen p-4 md:p-10 rtl" id="appMain">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 p-6 glass rounded-[2.5rem] shadow-2xl gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-3xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span id="subTitle" class="text-[10px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3 items-center w-full md:w-auto">
            <button onclick="toggleTheme()" class="bg-slate-900 light:bg-slate-200 border input-border rounded-xl px-4 py-2 hover:border-blue-500 transition">
                <i id="themeIcon" class="fas fa-moon text-blue-400"></i>
            </button>
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border input-border rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border input-border rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <optgroup label="Common"><option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="Java">Java</option><option value="C++">C++</option><option value="C#">C#</option></optgroup>
                <optgroup label="Others"><option value="SQL">SQL</option><option value="Go">Go</option><option value="PHP">PHP</option><option value="Rust">Rust</option><option value="Swift">Swift</option></optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        <div class="space-y-6">
            <div class="glass p-6 md:p-8 rounded-[3rem] shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span id="editorLabel" class="text-[11px] font-bold text-slate-500 uppercase" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-4">
                        <button onclick="pasteToCode()" class="text-[11px] text-emerald-400 font-bold hover:text-white transition flex items-center gap-1"><i class="fas fa-paste"></i> <span data-i18n="paste">لصق</span></button>
                        <label class="text-[11px] text-blue-400 font-bold cursor-pointer hover:text-white transition flex items-center gap-1"><i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span data-i18n="upload">رفع ملف</span></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-64 editor-box p-6 text-sm text-blue-300 outline-none resize-none font-mono mb-4 transition shadow-inner" placeholder="..."></textarea>
                <textarea id="errorInput" class="w-full h-24 bg-slate-950 border input-border rounded-xl p-4 text-xs text-red-400 outline-none resize-none mb-4" placeholder="Terminal Error..."></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border input-border rounded-2xl px-5 py-4 text-sm outline-none mb-4 focus:border-blue-500 transition shadow-lg" data-i18n-ph="ph_inq">
                <button onclick="runDebugger()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl transition active:scale-[0.98]"><span data-i18n="btn">تصحيح وتحويل ذكي ⚡</span></button>
            </div>
        </div>

        <div class="space-y-6 relative min-h-[500px]">
            <div id="loader" class="hidden glass rounded-[3rem] flex flex-col items-center justify-center p-12 text-center absolute inset-0 z-10"><i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i><p class="text-sm font-bold animate-pulse text-blue-200" data-i18n="loading">جاري تحليل المنطق...</p></div>
            <div id="placeholder" class="glass h-full rounded-[3rem] flex flex-col items-center justify-center text-slate-600 p-12 text-center border border-dashed border-white/5"><i class="fas fa-code-branch text-6xl mb-6 opacity-20"></i><p class="text-sm font-medium italic" data-i18n="placeholder">النتيجة ستظهر هنا.</p></div>

            <div id="resultArea" class="hidden space-y-6">
                <div class="glass p-6 md:p-8 rounded-[2rem] border-r-8 border-emerald-500 shadow-2xl">
                    <h4 class="text-[11px] font-black text-emerald-400 mb-3 uppercase" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed italic"></p>
                </div>
                <div class="code-container shadow-2xl">
                    <div class="code-header bg-[#161b22] dark:bg-[#161b22] light:bg-[#e2e8f0] px-5 py-3 flex justify-between items-center border-b input-border"><span class="text-[10px] font-bold text-slate-400 uppercase">Corrected Code</span><button onclick="copyCode()" id="lblCopy" class="text-blue-400 hover:text-white text-xs font-black transition flex items-center gap-1"><i id="copyIcon" class="fas fa-copy"></i> <span id="copyText" data-i18n="copy">نسخ</span></button></div>
                    <pre id="preCode"><code></code></pre>
                </div>
                <div id="feedbackBox" class="glass p-6 rounded-[2rem] text-center border input-border feedback-box-border">
                    <p class="text-xs font-bold text-slate-500 dark:text-slate-500 light:text-slate-600 mb-4" data-i18n="feedback_q">هل كانت النتيجة مفيدة؟</p>
                    <div class="flex justify-center gap-8 mb-4"><i onclick="setRating('good')" id="rateGood" class="fas fa-thumbs-up text-2xl feedback-btn text-emerald-500"></i><i onclick="setRating('bad')" id="rateBad" class="fas fa-thumbs-down text-2xl feedback-btn text-red-500"></i></div>
                    <div id="commentBox" class="hidden space-y-3"><textarea id="feedbackComment" class="w-full h-20 bg-slate-950 border input-border rounded-xl p-3 text-xs outline-none light:text-slate-900" placeholder="ملاحظات إضافية..."></textarea><button onclick="sendFeedback()" class="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-xl text-xs font-bold transition text-white" data-i18n="send">إرسال</button></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي عالمي", editor: "محرر الكود", upload: "رفع ملف", error: "خطأ", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "النتيجة ستظهر هنا بتنسيق احترافي.", loading: "جاري تحليل المنطق...", ph_inq: "عايز تعمل إيه بالكود؟", copy: "نسخ", copied: "تم نسخ الكود 😊", paste: "لصق", analysis_title: "تحليل ذكاء AETHER", feedback_q: "هل النتيجة مفيدة؟", send: "إرسال" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", upload: "Upload File", error: "Error", btn: "Aether Debug ⚡", placeholder: "Results here.", loading: "AI thinking...", ph_inq: "What's the goal?", copy: "COPY", copied: "Code copied! 😊", paste: "Paste", analysis_title: "AETHER ANALYSIS", feedback_q: "Was this helpful?", send: "Send" }
        };

        function getT() { return i18n[document.getElementById('uiLang').value] || i18n['en']; }

        function changeUILang() {
            const t = getT();
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('appBody').dir = (document.getElementById('uiLang').value === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        // Theme Switcher Logic
        function toggleTheme() {
            const app = document.getElementById('appBody');
            const icon = document.getElementById('themeIcon');
            const prismLink = document.getElementById('prismTheme');
            
            if (app.classList.contains('dark')) {
                app.classList.remove('dark'); app.classList.add('light');
                icon.className = 'fas fa-sun text-amber-500';
                prismLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css'; // Light Prism
            } else {
                app.classList.remove('light'); app.classList.add('dark');
                icon.className = 'fas fa-moon text-blue-400';
                prismLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css'; // Dark Prism
            }
        }

        async function runDebugger() {
            const code = document.getElementById('codeInput').value, inquiry = document.getElementById('inquiryInput').value, uiLang = document.getElementById('uiLang').value;
            if(!code && !inquiry) return alert(uiLang === 'ar' ? "اكتب حاجة يا هندسة!" : "Please input something!");
            
            document.getElementById('loader').classList.remove('hidden'); document.getElementById('placeholder').classList.add('hidden'); 
            document.getElementById('resultArea').classList.add('hidden'); document.getElementById('commentBox').classList.add('hidden');

            const fd = new FormData();
            fd.append('code', code || ""); fd.append('lang', document.getElementById('progLang').value); fd.append('ui_lang', uiLang); fd.append('inquiry', inquiry); fd.append('error_log', document.getElementById('errorInput').value);

            try {
                const response = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await response.json();
                document.getElementById('expText').innerText = data.explanation;
                const pre = document.getElementById('preCode');
                pre.innerHTML = `<code class="language-${document.getElementById('progLang').value.toLowerCase()}">${data.result.replace(/</g, "&lt;")}</code>`;
                
                setTimeout(() => {
                    Prism.highlightElement(pre.querySelector('code'));
                    document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
                }, 100);
            } catch (e) {
                alert("Error! Try again.");
                document.getElementById('loader').classList.add('hidden'); document.getElementById('placeholder').classList.remove('hidden');
            }
        }

        // Modified Copy Logic (The "Laughing" Button)
        let copyCooldown = false;
        function copyCode() {
            if (copyCooldown) return;
            const t = getT();
            copyCooldown = true;
            
            const copyBtn = document.getElementById('lblCopy');
            const copyText = document.getElementById('copyText');
            const copyIcon = document.getElementById('copyIcon');
            
            navigator.clipboard.writeText(document.querySelector('#preCode code').textContent).then(() => {
                // Change UI to "Grinning Squint Tears"
                copyBtn.classList.add('success');
                copyText.innerText = t.copied;
                copyIcon.className = 'fas fa-face-grin-squint-tears text-emerald-400';

                // Revert after 3 seconds
                setTimeout(() => {
                    copyBtn.classList.remove('success');
                    copyText.innerText = t.copy;
                    copyIcon.className = 'fas fa-copy text-blue-400';
                    copyCooldown = false;
                }, 3000);
            });
        }

        function setRating(rate) { currentRating = rate; document.getElementById('rateGood').classList.toggle('active', rate === 'good'); document.getElementById('rateBad').classList.toggle('active', rate === 'bad'); document.getElementById('commentBox').classList.remove('hidden'); }
        async function sendFeedback() {
            const comment = document.getElementById('feedbackComment').value;
            const fd = new FormData(); fd.append('rating', currentRating); fd.append('comment', comment); fd.append('code_context', document.getElementById('codeInput').value);
            const res = await fetch('/api/feedback', { method: 'POST', body: fd }); const data = await res.json();
            document.getElementById('feedbackBox').innerHTML = `<p class='text-emerald-400 light:text-emerald-600 font-bold text-xs'>${data.message}</p>`;
        }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
    </script>
</body>
</html>
