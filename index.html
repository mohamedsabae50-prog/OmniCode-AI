<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCode AI | Final Master v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: radial-gradient(circle at center, #0d1117 0%, #01040a 100%); color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; font-size: 13px; overflow-x: hidden; }
        .glass-pro { background: rgba(13, 17, 23, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 1.2rem; }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.2rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(88,166,255,0.05); border-radius: 1rem; overflow: hidden; direction: ltr; margin-top: 10px; }
        .diff-box { background: #0d1117; padding: 15px; overflow-y: auto; height: auto; min-height: 200px; max-height: 450px; }
        .diff-label { font-size: 9px; font-weight: bold; color: #58a6ff; margin-bottom: 8px; text-transform: uppercase; opacity: 0.7; }
        pre { white-space: pre-wrap !important; word-break: break-all; font-size: 12px !important; line-height: 1.5; margin: 0 !important; }
        .perf-badge { background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,165,0,0.05) 100%); border: 1px solid rgba(255,215,0,0.3); color: #ffd700; padding: 4px 12px; border-radius: 10px; font-size: 10px; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        .interaction-pop { position: fixed; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 9999; }
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50px) scale(1.5); opacity: 0; } }
        .reveal-node { opacity: 0; transform: translateY(20px); }
        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%); filter: blur(30px); pointer-events: none; }
    </style>
</head>
<body class="p-2 md:p-4 rtl">
    <div id="glassParticles" class="fixed inset-0 -z-10"></div>

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-5 p-4 glass-pro shadow-xl gap-4 reveal-node">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[8px] text-slate-400 uppercase tracking-widest italic" data-i18n="subtitle">Precision AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-[11px] font-bold text-white outline-none">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-[11px] font-bold text-white outline-none">
                <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option><option value="Java">Java</option><option value="C++">C++</option>
            </select>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-5 items-start">
        <div class="space-y-5 reveal-node">
            <div class="glass-pro p-5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" data-i18n="editor">محرر الأكواد ذكي</span>
                    <div class="flex gap-4">
                        <button onclick="handleAction(this, '📋', 'paste')" class="text-emerald-400 font-bold text-[10px] flex items-center gap-1">📋 لصق</button>
                        <label class="btn-interact text-blue-400 font-bold text-[10px] flex items-center gap-1 cursor-pointer">📁 ملف<input type="file" class="hidden" onchange="handleAction(this, '📁', 'file')"></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-56 bg-[#05070a] border border-slate-800 rounded-xl p-4 text-xs outline-none font-mono mb-4 text-blue-300 shadow-inner" style="direction: ltr; text-align: left;" placeholder="🔙 ضـع كـودك هـنـا"></textarea>
                <textarea id="errorInput" class="w-full h-16 bg-[#05070a] border border-slate-800 rounded-xl p-3 text-[10px] text-red-400 outline-none mb-3" style="direction: ltr; text-align: left;" placeholder="رسالة الخطأ (اختياري)..."></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-3 text-xs outline-none mb-4 text-white shadow-lg" data-i18n-ph="ph_inq">
                <button onclick="handleAction(this, '🚀', 'run')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-xs text-white shadow-xl"><span data-i18n="btn">تحليل ومعالجة ذكية ⚡</span></button>
            </div>
        </div>

        <div class="space-y-5 relative min-h-[500px] reveal-node" id="resultNode">
            <div id="loader" class="hidden glass-pro rounded-xl absolute inset-0 flex flex-col items-center justify-center p-10 z-50"><i class="fas fa-atom fa-spin text-3xl text-blue-500 mb-3"></i><p class="animate-pulse text-xs font-bold text-blue-400">استحضار الذكاء... ✨</p></div>
            <div id="placeholder" class="glass-pro h-[500px] flex flex-col items-center justify-center text-slate-600 border-dashed border border-slate-800"><p class="text-sm italic">بانتظار الأكواد للتحليل...</p></div>

            <div id="resultArea" class="hidden space-y-4">
                <div class="perf-badge"><i class="fas fa-bolt"></i> <span id="complexityText">Calculating...</span></div>
                <div class="glass-pro p-4 border-r-4 border-emerald-500 shadow-lg"><h4 class="text-[9px] font-black text-emerald-400 mb-1 uppercase">تحليل AETHER</h4><p id="expText" class="text-[11px] leading-relaxed font-medium text-slate-200"></p></div>
                <button onclick="handleAction(this, '📄', 'pdf')" class="w-full bg-emerald-600/10 border border-emerald-500/30 py-2 rounded-xl text-[10px] font-bold text-emerald-400">📄 <span data-i18n="download_report">تحميل التقرير (PDF)</span></button>
                <div class="diff-container shadow-xl">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label">Original</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label flex justify-between">Fixed <button onclick="handleAction(this, '✨', 'copy')" class="text-blue-400 text-[10px]">نسخ</button></div><pre id="preCode"><code></code></pre></div>
                </div>
                <div class="glass-pro p-4 border border-blue-500/20">
                    <div class="flex gap-2">
                        <input id="followUpInput" type="text" class="flex-1 bg-[#05070a] border border-slate-800 rounded-lg px-3 py-2 text-xs outline-none text-white" placeholder="لسة عايز تعديلات؟">
                        <button onclick="handleAction(this, '🔄', 'update')" class="bg-slate-800 px-4 rounded-lg text-[10px] font-bold text-white">تحديث</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "محلل الأكواد جراحي بالذكاء", editor: "محرر الأكواد", btn: "تحليل ومعالجة ذكية ⚡", placeholder: "بانتظار الأكواد للتحليل...", ph_inq: "ما هو هدفك البرمجي؟", download_report: "تحميل التقرير (PDF) 📄" },
            en: { subtitle: "Precision AI Debugger", editor: "CODE EDITOR", btn: "Smart AI Fix ⚡", placeholder: "Waiting for code...", ph_inq: "What's the goal?", download_report: "Download PDF 📄" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value; const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')] || el.innerText; });
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        function handleAction(el, emoji, type) {
            anime({ targets: el, scale: [1, 0.85, 1], duration: 300, easing: 'easeOutBack' });
            const rect = el.getBoundingClientRect();
            const pop = document.createElement('span'); pop.className = 'interaction-pop'; pop.innerText = emoji;
            pop.style.left = `${rect.left + rect.width / 2}px`; pop.style.top = `${rect.top}px`;
            document.body.appendChild(pop); setTimeout(() => pop.remove(), 600);

            if(type === 'paste') navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t);
            if(type === 'file') { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(el.files[0]); }
            if(type === 'run') runDebugger();
            if(type === 'update') runDebugger(true);
            if(type === 'copy') { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("تم النسخ ✅"); }
            if(type === 'pdf') generatePDF();
        }

        async function runDebugger(isFollowUp = false) {
            const code = isFollowUp ? document.querySelector('#preCode code').innerText : document.getElementById('codeInput').value;
            document.getElementById('loader').classList.remove('hidden');
            if(!isFollowUp) { document.getElementById('resultArea').classList.add('hidden'); document.getElementById('placeholder').classList.add('hidden'); }
            
            const fd = new FormData();
            fd.append('code', code); fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', document.getElementById('inquiryInput').value);
            fd.append('error_log', document.getElementById('errorInput').value);
            if(isFollowUp) fd.append('follow_up', document.getElementById('followUpInput').value);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await res.json();
                document.getElementById('expText').innerText = data.explanation;
                document.getElementById('complexityText').innerText = data.complexity || "N/A";
                if(!isFollowUp) document.getElementById('oldCode').innerText = document.getElementById('codeInput').value;
                const pre = document.getElementById('preCode');
                const selectedLang = document.getElementById('progLang').value.toLowerCase();
                pre.innerHTML = `<code class="language-${selectedLang}">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                Prism.highlightElement(pre.querySelector('code'));
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
                if(isFollowUp) document.getElementById('followUpInput').value = "";
            } catch (e) { document.getElementById('loader').classList.add('hidden'); }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const complexity = document.getElementById('complexityText').innerText;
            doc.setFillColor(20, 25, 35); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(88, 166, 255); doc.setFontSize(22); doc.text("AETHER CODE REPORT", 20, 30);
            doc.setTextColor(255, 215, 0); doc.setFontSize(10); doc.text(`PERFORMANCE: ${complexity}`, 20, 40);
            doc.setTextColor(200, 200, 200); doc.text(doc.splitTextToSize(document.querySelector('#preCode code').innerText, 170), 20, 60);
            doc.save("Aether_Solution.pdf");
        }

        window.onload = () => {
            anime({ targets: '.reveal-node', translateY: [30, 0], opacity: [0, 1], delay: anime.stagger(150), easing: 'easeOutExpo' });
            const container = document.getElementById('glassParticles');
            for(let i=0; i<8; i++) {
                const p = document.createElement('div'); p.className = 'ethereal-particle';
                p.style.width = Math.random()*200+100+'px'; p.style.height = p.style.width;
                p.style.left = Math.random()*100+'vw'; p.style.top = Math.random()*100+'vh';
                container.appendChild(p);
                anime({ targets: p, translateX: () => anime.random(-30, 30), translateY: () => anime.random(-30, 30), duration: () => anime.random(4000, 8000), loop: true, direction: 'alternate', easing: 'easeInOutSine' });
            }
        };
    </script>
</body>
</html>
