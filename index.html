            sidebar.style.left = (lang === 'en') ? '-320px' : 'auto';

                    </ul>
                    <p class="text-emerald-400 mt-4 font-bold text-xs">أكوادك في أمان تام وتُعالج بسرية.</p>
                `;
                document.getElementById('modalTermsTitle').innerText = "شروط الخدمة";
                document.getElementById('modalTermsContent').innerHTML = `
                    <p>باستخدامك لأداة <strong>AetherCode</strong>، فإنك توافق على الشروط التالية:</p>
                    <ul class="list-disc list-inside space-y-2 text-slate-400 mt-2">
                        <li><strong>الاستخدام المشروع:</strong> يُرجى استخدام هذه الأداة لأغراض تعليمية وبرمجية مشروعة فقط.</li>
                        <li><strong>دقة النتائج:</strong> الأداة تعتمد على نماذج ذكاء اصطناعي، وقد تحتوي النتائج على أخطاء. يُنصح دائماً بمراجعة الكود قبل استخدامه الفعلي.</li>
                        <li><strong>إخلاء المسؤولية:</strong> المطور (SilentAlgo) غير مسؤول عن أي أضرار تنتج عن استخدام أكواد تم إنشاؤها بواسطة هذه الأداة.</li>
                    </ul>
                `;
            } else {
                document.getElementById('modalPrivacyTitle').innerText = "Privacy Policy";
                document.getElementById('modalPrivacyContent').innerHTML = `
                    <p>At <strong>AetherCode</strong>, we take your privacy seriously.</p>
                    <ul class="list-disc list-inside space-y-2 text-slate-400 mt-2">

        // دوال النوافذ المنبثقة
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            const privacy = document.getElementById('privacyModal');
            const terms = document.getElementById('termsModal');
            if (event.target == privacy) privacy.classList.add('hidden');
            if (event.target == terms) terms.classList.add('hidden');
        }

        function toggleHistory() {
            const lang = document.getElementById('uiLang').value;
            const sidebar = document.getElementById('historySidebar');
            document.getElementById('sidebarOverlay').classList.toggle('active');
            if(lang === 'ar') sidebar.style.right = (sidebar.style.right === '0px') ? '-320px' : '0px';
            else sidebar.style.left = (sidebar.style.left === '0px') ? '-320px' : '0px';
        }

        async function handleAction(emoji, type) {
            if(type === 'paste') document.getElementById('codeInput').value = await navigator.clipboard.readText();
            if(type === 'copy') { 
                navigator.clipboard.writeText(document.getElementById('codeOutput').textContent); 
                const btn = document.getElementById('btnCopy');
                const originalText = btn.innerText;
                btn.innerText = (document.getElementById('uiLang').value === 'ar') ? "تم النسخ بنجاح! ✔️" : "Copied! ✔️";
                btn.classList.add('bg-emerald-600');
                setTimeout(() => { btn.innerText = originalText; btn.classList.remove('bg-emerald-600'); }, 2000);
            }
            if(type === 'pdf') generatePDF();
            if(type === 'run' || type === 'update') runDebugger(type === 'update');
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('codeInput').value = e.target.result;
            reader.readAsText(input.files[0]);
        }
        
        // دالة تفريغ الشاشة (المكنسة)
        function clearAll() {
            document.getElementById('codeInput').value = '';
            document.getElementById('errorInput').value = '';
            document.getElementById('inquiryInput').value = '';
            document.getElementById('followUpInput').value = '';
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            document.getElementById('codeOutput').textContent = '';
            document.getElementById('expText').innerText = '';
        }

        async function runDebugger(isUpdate = false) {
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            
            const selectedLang = document.getElementById('progLang').value;
            const rawCode = isUpdate ? document.getElementById('codeOutput').innerText : document.getElementById('codeInput').value;

            const payload = {
                code: rawCode, 
                lang: selectedLang,
                ui_lang: document.getElementById('uiLang').value,
                inquiry: document.getElementById('inquiryInput').value || "Fix code logic",
                follow_up: isUpdate ? document.getElementById('followUpInput').value : ""
            };
            
            try {
                const res = await fetch('/api/index', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
                });
                const data = await res.json();
                renderResult(data);
                if(!isUpdate) saveToHistory(data, document.getElementById('codeInput').value);
                
                if(isUpdate) document.getElementById('followUpInput').value = "";
                
            } catch (e) { 
                alert(document.getElementById('uiLang').value === 'ar' ? "حدث خطأ في الاتصال بالخادم." : "Server Connection Error."); 
            } finally { 
                document.getElementById('loader').classList.add('hidden'); 
            }
        }

        function renderResult(data) {
            document.getElementById('resultArea').classList.remove('hidden');
            
            document.getElementById('expText').innerText = data.explanation || (document.getElementById('uiLang').value === 'ar' ? "لا يوجد شرح متوفر" : "No explanation available");
            document.getElementById('complexityBadge').innerText = data.complexity || "O(?)";
            
            const codeBox = document.getElementById('codeOutput');
            codeBox.innerText = ''; 
            
            if (data.result) {
                codeBox.textContent = data.result.trim();
            } else {
                codeBox.textContent = "// Error: لم يتم استلام كود من الخادم";
            }

            const lang = document.getElementById('progLang').value.toLowerCase().replace('++', 'cpp').replace('#', 'csharp');
            codeBox.className = `language-${lang}`;
            Prism.highlightElement(codeBox);
        }

        function saveToHistory(data, original) { 
            let history = JSON.parse(localStorage.getItem('aether_history') || '[]');
            history.unshift({ lang: document.getElementById('progLang').value, inquiry: document.getElementById('inquiryInput').value || "Fix", time: new Date().toLocaleTimeString(), data, original });
            localStorage.setItem('aether_history', JSON.stringify(history.slice(0, 10)));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('aether_history') || '[]');
            list.innerHTML = history.map((item, i) => `<div onclick="loadHistory(${i})" class="glass-pro p-4 mb-2 border-r-2 border-blue-500 cursor-pointer text-[10px]"><span class="text-blue-400 font-bold">${item.lang}</span><p class="truncate opacity-60">${item.inquiry}</p></div>`).join('') || '<p class="text-center">Empty</p>';
        }

        function loadHistory(i) { 
            let history = JSON.parse(localStorage.getItem('aether_history') || '[]');
            const item = history[i]; 
            document.getElementById('codeInput').value = item.original; 
            document.getElementById('placeholder').classList.add('hidden');
            renderResult(item.data); 
            toggleHistory(); 
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const code = document.getElementById('codeOutput').textContent;
            const exp = document.getElementById('expText').innerText;

            doc.setFillColor(13, 17, 23);
            doc.rect(0, 0, 210, 297, 'F');

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1600;
            canvas.height = 2000;
            
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#58a6ff';
            ctx.direction = 'rtl';
            ctx.fillText("AetherCode AI Analysis Report", 1550, 80);
            
            ctx.font = '30px Arial';
            ctx.fillStyle = '#ffffff';
            
            const lines = getLines(ctx, exp, 1500);
            let y = 180;
            ctx.fillText("Explanation:", 1550, 140);
            
            ctx.fillStyle = '#cccccc';
            lines.forEach(line => {
                ctx.fillText(line, 1550, y);
                y += 50;
            });

            ctx.fillStyle = '#58a6ff';
            ctx.fillText("Optimized Code:", 1550, y + 50);
            
            ctx.font = '25px Courier New';
            ctx.fillStyle = '#63ff96';
            const codeLines = code.split('\n');
            y += 100;
            codeLines.forEach(line => {
                ctx.direction = 'ltr'; 
                ctx.fillText(line, 100, y);
                y += 40;
            });

            const imgData = canvas.toDataURL('image/png');
            doc.addImage(imgData, 'PNG', 0, 0, 210, 260);
            doc.save(`AetherCode_Report.pdf`);
        }

        function getLines(ctx, text, maxWidth) {
            var words = text.split(" ");
            var lines = [];
            var currentLine = words[0];

            for (var i = 1; i < words.length; i++) {
                var word = words[i];
                var width = ctx.measureText(currentLine + " " + word).width;
                if (width < maxWidth) {
                    currentLine += " " + word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        // تشغيل دوال أول ما الصفحة تحمل
        window.onload = function() {
            updateHistoryUI();
            updateUILanguage(); // عشان نظبط لغة النوافذ المنبثقة أول ما يفتح
        };
    </script>
</body>
