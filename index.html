<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .editor-box { background: #0a0e17; border: 1px solid #21262d; border-radius: 1rem; }
        textarea { font-size: 16px !important; } 
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .code-container { background: #0d1117; border-radius: 1.5rem; border: 1px solid #30363d; overflow: hidden; }
        pre[class*="language-"] { padding: 1rem !important; margin: 0 !important; font-size: 12px !important; }
    </style>
</head>
<body class="min-h-screen p-3 md:p-10 rtl" id="mainContainer">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-6 md:mb-10 p-4 md:p-6 glass rounded-2xl md:rounded-[2.5rem] shadow-2xl gap-4">
        <div class="flex items-center gap-3">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-2xl md:text-3xl font-black italic text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span id="lblSubTitle" class="text-[9px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-2 md:gap-4 items-center w-full md:w-auto justify-center">
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-[10px] font-bold outline-none cursor-pointer">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-[10px] font-bold outline-none cursor-pointer">
                <optgroup label="الأكثر استخداماً">
                    <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="Java">Java</option><option value="C++">C++</option><option value="C#">C#</option>
                </optgroup>
                <optgroup label="تطوير الخلفية">
                    <option value="SQL">SQL</option><option value="Go">Go</option><option value="PHP">PHP</option>
                </optgroup>
                <optgroup label="الأنظمة">
                    <option value="Rust">Rust</option><option value="Swift">Swift</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10">
        <div class="space-y-4 md:space-y-6">
            <div class="glass p-5 md:p-8 rounded-[2rem] md:rounded-[3rem] shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <span id="lblEditor" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-4">
                        <button onclick="pasteToCode()" class="text-[10px] text-emerald-400 font-bold hover:text-white transition"><i class="fas fa-paste"></i> <span id="lblPaste" data-i18n="paste">لصق</span></button>
                        <label class="text-[10px] text-blue-400 font-bold cursor-pointer hover:text-white transition"><i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span id="lblUpload" data-i18n="upload">رفع ملف</span></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-48 md:h-72 editor-box p-4 md:p-6 text-sm text-blue-300 outline-none resize-none font-mono mb-4"></textarea>
                <span id="lblError" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2" data-i18n="error">رسالة الخطأ</span>
                <textarea id="errorInput" class="w-full h-20 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs text-red-400 outline-none mb-4"></textarea>
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm outline-none mb-4" data-placeholder="ph_inq">
                <button onclick="runDebugger()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg md:text-xl shadow-lg transition-all active:scale-95"><span id="lblBtn" data-i18n="btn">تصحيح وتحويل ذكي ⚡</span></button>
            </div>
        </div>

        <div class="relative">
            <div id="loader" class="hidden glass min-h-[300px] h-full rounded-[2rem] md:rounded-[3rem] flex flex-col items-center justify-center p-10 text-center">
                <i class="fas fa-brain fa-spin text-4xl text-blue-500 mb-4"></i>
                <p id="lblLoading" class="text-xs animate-pulse" data-i18n="loading">Analyzing cortex logic...</p>
            </div>
            <div id="placeholder" class="glass min-h-[300px] h-full rounded-[2rem] md:rounded-[3rem] flex flex-col items-center justify-center text-slate-700 p-6 text-center italic">
                <i class="fas fa-code-branch text-5xl mb-4 opacity-10"></i>
                <p id="lblPlaceholder" class="text-sm" data-i18n="placeholder">التحليل والحل سيظهر هنا.</p>
            </div>
            <div id="resultArea" class="hidden space-y-4 md:space-y-6">
                <div class="glass p-5 md:p-6 rounded-[1.5rem] border-r-4 border-emerald-500">
                    <p id="expText" class="text-sm leading-relaxed text-slate-300 italic"></p>
                </div>
                <div class="code-container">
                    <div class="code-header bg-[#161b22] p-3 flex justify-between items-center">
                        <span id="langLabel" class="text-[9px] font-bold text-slate-500 uppercase">Code</span>
                        <button onclick="copyCode()" id="lblCopy" class="text-blue-400 hover:text-white text-[10px] font-bold" data-i18n="copy">نسخ 📋</button>
                    </div>
                    <pre id="preCode" class="line-numbers"><code></code></pre>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي بالذكاء الاصطناعي العالمي", editor: "محرر الكود", upload: "رفع ملف", error: "رسالة الخطأ", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل والحل سيظهر هنا.", loading: "جاري تحليل المنطق...", ph_code: "ضع كود هنا...", ph_err: "انسخ الخطأ هنا...", ph_inq: "عايز تعمل إيه بالكود؟", copy: "نسخ 📋", paste: "لصق" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR",
