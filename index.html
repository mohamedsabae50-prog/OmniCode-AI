<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', sans-serif; transition: 0.4s; overflow-x: hidden; }
        .glass-pro { background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); }
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 🔥 تعديل الـ Split View ليكون مفروداً 🔥 */
        .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #30363d; border-radius: 1.5rem; overflow: hidden; direction: ltr; margin-top: 15px; }
        .diff-box { background: #0d1117; padding: 20px; overflow-x: auto; height: auto; min-height: 300px; }
        .diff-label { font-size: 10px; font-weight: bold; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #21262d; padding-bottom: 5px; }
        pre { white-space: pre !important; font-size: 13px !important; line-height: 1.6; margin: 0 !important; }

        .btn-interact { transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .btn-interact:active { transform: scale(0.96); }
        .emoji-pop { position: absolute; pointer-events: none; animation: popUp 0.8s forwards; font-size: 1.8rem; top: -20px; left: 50%; transform: translateX(-50%); }
        @keyframes popUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50px) scale(1.3); opacity: 0; } }

        .glass-background-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .ethereal-particle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%); filter: blur(30px); animation: floatParticle 30s infinite linear; }
        @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0.5); opacity: 0; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-10 rtl">
    <div class="glass-background-elements" id="glassParticles"></div>

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 p-6 glass-pro rounded-[2.5rem] gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="text-right">
                <h1 class="text-3xl font-black italic text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[10px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3">
            <select id="uiLang" onchange="changeUILang()" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none text-white">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none text-white">
                <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="HTML">HTML</option><option value="Java">Java</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <div class="space-y-6">
            <div class="glass-pro p-8 rounded-[3rem]">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-4">
                        <button onclick="animateBtn(this, '📋'); pasteToCode()" class="btn-interact text-emerald-500 font-bold text-xs"><i class="fas fa-paste"></i> <span data-i18n="paste">لصق</span></button>
                        <label class="btn-interact text-blue-500 font-bold text-xs cursor-pointer"><i class="fas fa-file-upload"></i> <span data-i18n="upload">رفع ملف</span><input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-80 bg-slate-950 border border-slate-800 rounded-2xl p-6 text-sm outline-none resize-none font-mono mb-4 text-blue-300 focus:border-blue-500 transition" style="direction: ltr; text-align: left;" placeholder="🔙 ضـع كـودك هـنـا (Ctrl+V)"></textarea>
                
                <span class="text-[10px] font-bold text-slate-500 uppercase block mb-2" data-i18n="error_lbl">رسالة الخطأ من التيرمنال (اختياري)</span>
                <textarea id="errorInput" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs text-red-400 outline-none resize-none mb-4" style="direction: ltr; text-align: left;" placeholder="Paste error here..."></textarea>
                
                <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-6 focus:border-blue-500 transition text-white" data-i18n-ph="ph_inq">
                <button onclick="animateBtn(this, '🚀'); runDebugger()" id="runBtn" class="btn-interact w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl"><span data-i18n="btn">معالجة وتحليل الذكاء ⚡</span></button>
            </div>
        </div>

        <div class="space-y-6 relative min-h-[500px]">
            <div id="loader" class="hidden glass-pro rounded-[3rem] absolute inset-0 flex flex-col items-center justify-center p-20 text-center z-10"><i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i><p class="animate-pulse" data-i18n="loading">تحليل المنطق جراحياً...</p></div>
            <div id="placeholder" class="glass-pro h-full rounded-[3rem] flex flex-col items-center justify-center text-slate-600 p-12 text-center border border-dashed border-slate-800"><i class="fas fa-code-branch text-6xl mb-6 opacity-10"></i><p data-i18n="placeholder">النتائج ستظهر هنا للمقارنة.</p></div>

            <div id="resultArea" class="hidden space-y-6">
                <div class="glass-pro p-6 rounded-[2rem] border-r-8 border-emerald-500 shadow-xl">
                    <h4 class="text-[11px] font-black text-emerald-400 mb-2 uppercase" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed text-white"></p>
                </div>
                <div class="diff-container shadow-2xl">
                    <div class="diff-box border-r border-slate-800"><div class="diff-label">Original</div><pre id="oldCode"><code></code></pre></div>
                    <div class="diff-box"><div class="diff-label flex justify-between">Fixed <button onclick="animateBtn(this, '✨'); copyCode()" class="text-blue-400"><i class="fas fa-copy"></i></button></div><pre id="preCode"><code></code></pre></div>
                </div>
                <div id="followUpBox" class="glass-pro p-6 rounded-[2rem]">
                    <span class="text-[10px] font-bold text-slate-500 uppercase block mb-3" data-i18n="follow_lbl">📝 لـسـة عـايـز تـعـديلات؟</span>
                    <input id="followUpInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none mb-4 focus:border-blue-500 transition text-white" data-i18n-ph="ph_follow">
                    <button onclick="animateBtn(this, '🔄'); runDebugger(true)" class="btn-interact w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold text-white"><span data-i18n="btn_follow">تحديث الكود 🔄</span></button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي عالمي", editor: "محرر الكود", btn: "معالجة وتحليل الذكاء ⚡", placeholder: "النتائج ستظهر هنا للمقارنة.", loading: "جاري تحليل المنطق جراحياً...", ph_inq: "عايز تعمل إيه بالكود؟", analysis_title: "تحليل ذكاء AETHER", upload: "رفع ملف", paste: "لصق", error_lbl: "رسالة الخطأ من التيرمنال (اختياري)", follow_lbl: "📝 لـسـة عـايـز تـعـديلات؟", ph_follow: "اكتب طلبك الإضافي هنا...", btn_follow: "تحديث الكود 🔄", ph_code: "🔙 ضـع كـودك هـنـا (Ctrl+V)", ph_error: "أدخل رسالة الخطأ هنا..." },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", btn: "Aether Cortex Fix ⚡", placeholder: "Results here.", loading: "Surgical Analysis...", ph_inq: "Goal?", analysis_title: "AETHER ANALYSIS", upload: "Upload", paste: "Paste", error_lbl: "Terminal Error (Optional)", follow_lbl: "📝 NEED MORE EDITS?", ph_follow: "Type here...", btn_follow: "Update Code 🔄", ph_code: "🔙 Paste code here...", ph_error: "Paste error log here..." }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value; const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('codeInput').placeholder = t.ph_code;
            document.getElementById('errorInput').placeholder = t.ph_error;
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('followUpInput').placeholder = t.ph_follow;
            document.getElementById('appBody').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        function animateBtn(btn, emoji) { const pop = document.createElement('span'); pop.className = 'emoji-pop'; pop.innerText = emoji; btn.appendChild(pop); setTimeout(() => pop.remove(), 800); }

        const container = document.getElementById('glassParticles');
        for(let i=0; i<12; i++) {
            const p = document.createElement('div'); p.className = 'ethereal-particle';
            p.style.width = Math.random()*200+100+'px'; p.style.height = p.style.width;
            p.style.left = Math.random()*100+'vw'; p.style.animationDelay = Math.random()*20+'s';
            container.appendChild(p);
        }

        async function runDebugger(isFollowUp = false) {
            const code = document.getElementById('codeInput').value;
            document.getElementById('loader').classList.remove('hidden');
            if(!isFollowUp) { document.getElementById('resultArea').classList.add('hidden'); document.getElementById('placeholder').classList.add('hidden'); }
            
            const fd = new FormData();
            fd.append('code', code); fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', document.getElementById('inquiryInput').value);
            fd.append('error_log', document.getElementById('errorInput').value);
            if(isFollowUp) fd.append('follow_up', document.getElementById('followUpInput').value);

            try {
                const res = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await res.json();
                document.getElementById('expText').innerText = data.explanation;
                document.getElementById('oldCode').innerText = code;
                const pre = document.getElementById('preCode');
                pre.innerHTML = `<code class="language-python">${data.result.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>`;
                Prism.highlightElement(pre.querySelector('code'));
                Prism.highlightElement(document.getElementById('oldCode'));
                document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
            } catch { document.getElementById('loader').classList.add('hidden'); }
        }

        function copyCode() { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
    </script>
</body>
</html>
