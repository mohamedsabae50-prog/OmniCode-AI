<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>AetherCode AI | Pro Suite v24.0</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/606/606200.png">
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* تحسينات الموبايل */
@media (max-width: 768px) {
    body {
        padding: 10px !important; /* تقليل الهوامش */
    }
    
    header {
        flex-direction: column !important; /* ترتيب الهيدر طولي */
        text-align: center;
        gap: 15px !important;
    }

    main {
        grid-template-columns: 1fr !important; /* جعل المدخلات والنتائج تحت بعض */
        gap: 20px !important;
    }

    textarea#codeInput {
        height: 300px !important; /* تكبير منطقة الكود */
    }

    .glass-pro {
        padding: 15px !important; /* تقليل الحشو الداخلي */
    }

    .history-sidebar {
        width: 85% !important; /* السجل ياخد مساحة أكبر في الموبايل */
    }
    
    h1 {
        font-size: 1.5rem !important;
    }
    
    button {
        width: 100%; /* الزراير تاخد العرض كامل لسهولة الضغط */
        margin-bottom: 5px;
    }
}
        body { background: radial-gradient(circle at center, #0d1117 0%, #01040a 100%); color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass-pro { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(88, 166, 255, 0.1); border-radius: 1.2rem; }
        .history-sidebar { position: fixed; top: 0; width: 320px; height: 100vh; z-index: 1000; transition: all 0.4s ease; background: #0d1117; box-shadow: -10px 0 30px #000; }
        .logo-glow { text-shadow: 0 0 15px rgba(88, 166, 255, 0.5); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .sidebar-overlay.active { display: block; }
        pre { border-radius: 10px !important; font-size: 13px !important; background: #000 !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 p-5 glass-pro shadow-2xl gap-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-atom text-white text-xl"></i></div>
            <div>
                <h1 class="text-2xl font-black text-white italic logo-glow">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <p id="siteDesc" class="text-[9px] text-slate-500 uppercase tracking-widest font-bold">نظام فحص الأكواد المتقدم</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="btnHistory" onclick="toggleHistory()" class="bg-slate-800 px-5 py-2.5 rounded-xl text-[11px] font-bold text-blue-400 border border-blue-500/20">السجل</button>
            <select id="uiLang" onchange="updateUILanguage()" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-[11px] text-white outline-none"><option value="ar">العربية</option><option value="en">English</option></select>
            <select id="progLang" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-[11px] text-white outline-none">
                <option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="Java">Java</option><option value="C++">C++</option><option value="HTML">HTML</option>
                <option value="PHP">PHP</option><option value="C#">C#</option><option value="SQL">SQL</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="glass-pro p-6 space-y-5">
            <div class="flex justify-between items-center">
                <span id="lblEditor" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">محرر الأكواد الذكي</span>
                <div class="flex gap-4">
                    <button onclick="handleAction('📋', 'paste')" class="text-emerald-400 text-[11px] font-bold">لصق</button>
                    <label id="lblFile" class="text-blue-400 text-[11px] font-bold cursor-pointer">ملف <input type="file" class="hidden" onchange="handleFile(this)"></label>
                </div>
            </div>
            <textarea id="codeInput" class="w-full h-80 bg-black border border-slate-800 rounded-xl p-5 text-xs font-mono text-blue-300 outline-none" style="direction: ltr;"></textarea>
            <label id="lblError" class="text-[10px] font-bold text-slate-500 uppercase px-1 italic">رسالة الخطأ من التيرمنال</label>
            <textarea id="errorInput" class="w-full h-16 bg-black border border-slate-800 rounded-xl p-3 text-[10px] text-red-400 outline-none" style="direction: ltr;"></textarea>
            <input id="inquiryInput" type="text" class="w-full bg-slate-900 p-4 rounded-xl text-xs text-white outline-none" placeholder="ما المطلوب؟">
            <button id="btnRun" onclick="handleAction('⚡', 'run')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-xs text-white shadow-xl">تحليل وتصحيح ⚡</button>
        </div>

        <div id="resultNode" class="relative glass-pro p-6 min-h-[600px] flex flex-col">
            <div id="loader" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 rounded-xl z-50">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <div id="placeholder" class="flex-1 flex items-center justify-center text-slate-700 italic">بانتظار الكود...</div>
            <div id="resultArea" class="hidden space-y-4 flex-1">
                <div class="flex justify-between items-center"><span id="lblResultTag" class="bg-emerald-500/10 text-emerald-400 text-[10px] px-3 py-1 rounded-full font-bold uppercase">READY</span><span id="complexityBadge" class="text-slate-500 text-[10px] font-mono">O(?)</span></div>
                <div class="bg-slate-900/50 p-5 border-r-4 border-emerald-500 rounded-xl"><p id="expText" class="text-[11px] leading-relaxed text-slate-200"></p></div>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnCopy" onclick="handleAction('✂️', 'copy')" class="bg-slate-800 py-3 rounded-xl text-[10px] font-bold text-white">نسخ</button>
                    <button id="btnPdf" onclick="handleAction('📄', 'pdf')" class="bg-emerald-600 py-3 rounded-xl text-[10px] font-bold text-white">تحميل PDF</button>
                </div>
                <div class="bg-black rounded-xl overflow-hidden border border-slate-800 flex-1 shadow-inner">
                   <pre id="preCode" class="h-full custom-scrollbar" style="direction: ltr; text-align: left;">
    <code id="codeOutput"></code>
</pre>
                </div>
                <div class="flex gap-2 mt-4 glass-pro p-2">
                    <input id="followUpInput" type="text" class="flex-1 bg-black border border-slate-800 rounded-lg px-3 py-2 text-xs text-white outline-none" placeholder="اطلب تعديل...">
                    <button id="btnUpdate" onclick="handleAction('🔄', 'update')" class="bg-slate-800 px-4 rounded-lg text-[10px] font-bold text-blue-400">تحديث</button>
                </div>
            </div>
        </div>
    </main>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleHistory()"></div>
    <div id="historySidebar" class="history-sidebar p-6 flex flex-col shadow-2xl" style="right: -320px;">
        <h3 id="lblHistTitle" class="text-xs font-black text-blue-400 uppercase mb-6">السجل</h3>
        <div id="historyList" class="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>

    <script>
        const i18n = {
            ar: { dir: "rtl", desc: "نظام فحص الأكواد المتقدم", history: "السجل", editor: "محرر الأكواد الذكي", paste: "لصق", file: "ملف", error: "رسالة الخطأ من التيرمنال", inquiry: "ما المطلوب؟", run: "تحليل وتصحيح ذكي ⚡", placeholder: "بانتظار الكود...", resultTag: "جاهز", copy: "نسخ الكود", pdf: "تحميل PDF", follow: "اطلب تعديل...", update: "تحديث", histTitle: "سجل العمليات" },
            en: { dir: "ltr", desc: "Advanced AI Debugger", history: "History", editor: "Smart Code Editor", paste: "Paste", file: "File", error: "Terminal Error Message", inquiry: "What to fix?", run: "Analyze & Debug ⚡", placeholder: "Waiting for code...", resultTag: "Ready", copy: "Copy Code", pdf: "Download PDF", follow: "Further tweak...", update: "Update", histTitle: "History" }
        };

        function updateUILanguage() {
            const lang = document.getElementById('uiLang').value;
            const data = i18n[lang];
            const sidebar = document.getElementById('historySidebar');
            document.getElementById('htmlTag').dir = data.dir;
            document.getElementById('siteDesc').innerText = data.desc;
            document.getElementById('btnHistory').innerText = data.history;
            document.getElementById('lblEditor').innerText = data.editor;
            document.getElementById('lblFile').childNodes[0].textContent = data.file + " ";
            document.getElementById('lblError').innerText = data.error;
            document.getElementById('inquiryInput').placeholder = data.inquiry;
            document.getElementById('btnRun').innerText = data.run;
            document.getElementById('placeholder').innerText = data.placeholder;
            document.getElementById('lblResultTag').innerText = data.resultTag;
            document.getElementById('btnCopy').innerText = data.copy;
            document.getElementById('btnPdf').innerText = data.pdf;
            document.getElementById('followUpInput').placeholder = data.follow;
            document.getElementById('btnUpdate').innerText = data.update;
            document.getElementById('lblHistTitle').innerText = data.histTitle;
            sidebar.style.right = (lang === 'ar') ? '-320px' : 'auto';
            sidebar.style.left = (lang === 'en') ? '-320px' : 'auto';
        }

        function toggleHistory() {
            const lang = document.getElementById('uiLang').value;
            const sidebar = document.getElementById('historySidebar');
            document.getElementById('sidebarOverlay').classList.toggle('active');
            if(lang === 'ar') sidebar.style.right = (sidebar.style.right === '0px') ? '-320px' : '0px';
            else sidebar.style.left = (sidebar.style.left === '0px') ? '-320px' : '0px';
        }

        async function handleAction(emoji, type) {
            if(type === 'paste') document.getElementById('codeInput').value = await navigator.clipboard.readText();
            if(type === 'copy') { navigator.clipboard.writeText(document.getElementById('codeOutput').textContent); alert("Copied!"); }
            if(type === 'pdf') generatePDF();
            if(type === 'run' || type === 'update') runDebugger(type === 'update');
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('codeInput').value = e.target.result;
            reader.readAsText(input.files[0]);
        }

        async function runDebugger(isUpdate = false) {
            document.getElementById('loader').classList.remove('hidden');
            if(!isUpdate) document.getElementById('placeholder').classList.add('hidden');
            const payload = {
                code: isUpdate ? document.getElementById('codeOutput').innerText : document.getElementById('codeInput').value,
                lang: document.getElementById('progLang').value,
                ui_lang: document.getElementById('uiLang').value,
                inquiry: document.getElementById('inquiryInput').value || "Fix",
                error_log: document.getElementById('errorInput').value || "",
                follow_up: isUpdate ? document.getElementById('followUpInput').value : ""
            };

            try {
                const res = await fetch('/api/index', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
                });
                const data = await res.json();
                renderResult(data);
                if(!isUpdate) saveToHistory(data, document.getElementById('codeInput').value);
            } catch (e) { alert("API Error - تأكد من تشغيل uvicorn"); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function renderResult(data) {
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('expText').innerText = data.explanation;
            document.getElementById('complexityBadge').innerText = data.complexity || "O(?)";
            const codeBox = document.getElementById('codeOutput');
            const lang = document.getElementById('progLang').value.toLowerCase().replace('++', 'cpp').replace('#', 'csharp');
            codeBox.className = `language-${lang}`;
            codeBox.textContent = data.result.trim();
            Prism.highlightElement(codeBox);
        }

        function saveToHistory(data, original) { 
            let history = JSON.parse(localStorage.getItem('aether_history') || '[]');
            history.unshift({ lang: document.getElementById('progLang').value, inquiry: document.getElementById('inquiryInput').value || "Fix", time: new Date().toLocaleTimeString(), data, original });
            localStorage.setItem('aether_history', JSON.stringify(history.slice(0, 10)));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            let history = JSON.parse(localStorage.getItem('aether_history') || '[]');
            list.innerHTML = history.map((item, i) => `<div onclick="loadHistory(${i})" class="glass-pro p-4 mb-2 border-r-2 border-blue-500 cursor-pointer text-[10px]"><span class="text-blue-400 font-bold">${item.lang}</span><p class="truncate opacity-60">${item.inquiry}</p></div>`).join('') || '<p class="text-center">Empty</p>';
        }

        function loadHistory(i) { 
            let history = JSON.parse(localStorage.getItem('aether_history') || '[]');
            const item = history[i]; document.getElementById('codeInput').value = item.original; renderResult(item.data); toggleHistory(); 
        }

        // 🔥 الـ PDF الاحترافي المحدث 🔥
        // 🔥 دالة الـ PDF العبقرية لدعم العربية 🔥
async function generatePDF() {
    const { jsPDF } = window.jspdf;
    // إنشاء مستند جديد يدعم العربية (بإضافة وحدة خاصة)
    const doc = new jsPDF();
    
    const code = document.getElementById('codeOutput').textContent;
    const exp = document.getElementById('expText').innerText;
    const lang = document.getElementById('progLang').value;

    // تصميم الخلفية الداكنة
    doc.setFillColor(13, 17, 23);
    doc.rect(0, 0, 210, 297, 'F');

    // إعدادات النص العربي
    // ملحوظة: jsPDF يحتاج لخط خارجي، سنستخدم طريقة "الصور" لضمان ظهور العربية فوراً
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1600;
    canvas.height = 2000;
    
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0,0, canvas.width, canvas.height);
    
    ctx.font = 'bold 40px Arial';
    ctx.fillStyle = '#58a6ff';
    ctx.direction = 'rtl';
    ctx.fillText("AetherCode AI Analysis Report", 1550, 80);
    
    ctx.font = '30px Arial';
    ctx.fillStyle = '#ffffff';
    // تقسيم النص العربي لسطور
    const lines = getLines(ctx, exp, 1500);
    let y = 180;
    ctx.fillText("Explanation:", 1550, 140);
    
    ctx.fillStyle = '#cccccc';
    lines.forEach(line => {
        ctx.fillText(line, 1550, y);
        y += 50;
    });

    ctx.fillStyle = '#58a6ff';
    ctx.fillText("Optimized Code:", 1550, y + 50);
    
    ctx.font = '25px Courier New';
    ctx.fillStyle = '#63ff96';
    const codeLines = code.split('\n');
    y += 100;
    codeLines.forEach(line => {
        ctx.direction = 'ltr'; // الكود من الشمال
        ctx.fillText(line, 100, y);
        y += 40;
    });

    const imgData = canvas.toDataURL('image/png');
    doc.addImage(imgData, 'PNG', 0, 0, 210, 260);
    doc.save(`AetherCode_Report.pdf`);
}

// دالة مساعدة لتقسيم الكلام العربي لسطور
function getLines(ctx, text, maxWidth) {
    var words = text.split(" ");
    var lines = [];
    var currentLine = words[0];

    for (var i = 1; i < words.length; i++) {
        var word = words[i];
        var width = ctx.measureText(currentLine + " " + word).width;
        if (width < maxWidth) {
            currentLine += " " + word;
        } else {
            lines.push(currentLine);
            currentLine = word;
        }
    }
    lines.push(currentLine);
    return lines;
}
        window.onload = updateHistoryUI;
    </script>
</body>
</html>
