<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .editor-box { background: #0a0e17; border: 1px solid #21262d; border-radius: 1rem; direction: ltr !important; text-align: left !important; }
        textarea { font-size: 16px !important; } 
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .code-container { background: #0d1117; border-radius: 1.5rem; border: 1px solid #30363d; overflow: hidden; direction: ltr !important; }
        pre { padding: 1.25rem !important; margin: 0 !important; font-size: 13px !important; text-align: left !important; line-height: 1.6; }
        .feedback-btn { transition: 0.2s; cursor: pointer; opacity: 0.5; }
        .feedback-btn:hover, .feedback-btn.active { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 rtl" id="mainContainer">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 p-6 glass rounded-[2.5rem] shadow-2xl gap-6">
        <div class="flex items-center gap-4">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start text-right">
                <h1 class="text-3xl font-black italic text-white tracking-tighter">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span id="lblSubTitle" class="text-[10px] text-slate-400 uppercase italic" data-i18n="subtitle">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-3 items-center w-full md:w-auto">
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <option value="ar">العربية</option><option value="en">English</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                <optgroup label="Common"><option value="Python">Python</option><option value="JavaScript">JavaScript</option><option value="Java">Java</option><option value="C++">C++</option><option value="C#">C#</option></optgroup>
                <optgroup label="Others"><option value="SQL">SQL</option><option value="Go">Go</option><option value="PHP">PHP</option><option value="Rust">Rust</option><option value="Swift">Swift</option></optgroup>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        <div class="space-y-6">
            <div class="glass p-6 md:p-8 rounded-[3rem] shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span id="lblEditor" class="text-[11px] font-bold text-slate-500 uppercase" data-i18n="editor">محرر الكود</span>
                    <div class="flex gap-4">
                        <button onclick="pasteToCode()" class="text-[11px] text-emerald-400 font-bold hover:text-white transition flex items-center gap-1"><i class="fas fa-paste"></i> <span data-i18n="paste">لصق</span></button>
                        <label class="text-[11px] text-blue-400 font-bold cursor-pointer hover:text-white transition flex items-center gap-1"><i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span data-i18n="upload">رفع ملف</span></label>
                    </div>
                </div>
                <textarea id="codeInput" class="w-full h-64 editor-box p-6 text-sm text-blue-300 outline-none resize-none font-mono mb-4 border border-slate-800 focus:border-blue-500 transition" placeholder="..."></textarea>
                
                <div class="mb-4">
                    <span id="lblError" class="text-[10px] font-bold text-slate-500 uppercase block mb-2" data-i18n="error">رسالة الخطأ من التيرمنال (اختياري)</span>
                    <textarea id="errorInput" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs text-red-400 outline-none resize-none focus:border-red-500/30 transition" placeholder="Paste terminal error here..."></textarea>
                </div>

                <div class="mb-6">
                    <span id="lblInq" class="text-[10px] font-bold text-slate-500 uppercase block mb-2" data-i18n="inquiry_lbl">ماذا تريد أن تفعل بالكود؟</span>
                    <input id="inquiryInput" type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-sm outline-none focus:border-blue-500 transition shadow-lg" data-i18n-ph="ph_inq">
                </div>

                <button onclick="runDebugger()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[1.5rem] font-black text-lg text-white shadow-xl transition-all active:scale-[0.98]"><span data-i18n="btn">تصحيح وتحويل ذكي ⚡</span></button>
            </div>
        </div>

        <div class="space-y-6">
            <div id="loader" class="hidden glass rounded-[3rem] flex flex-col items-center justify-center p-12 text-center"><i class="fas fa-brain fa-spin text-5xl text-blue-500 mb-6"></i><p class="text-sm font-bold animate-pulse text-blue-200" data-i18n="loading">جاري التحليل...</p></div>
            <div id="placeholder" class="glass min-h-[400px] rounded-[3rem] flex flex-col items-center justify-center text-slate-600 p-12 text-center border border-dashed border-white/5"><i class="fas fa-code-branch text-6xl mb-6 opacity-20"></i><p class="text-sm font-medium italic" data-i18n="placeholder">النتيجة ستظهر هنا.</p></div>

            <div id="resultArea" class="hidden space-y-6">
                <div class="glass p-6 md:p-8 rounded-[2rem] border-r-8 border-emerald-500 shadow-2xl">
                    <h4 class="text-[11px] font-black text-emerald-400 mb-3 uppercase tracking-widest" data-i18n="analysis_title">تحليل ذكاء AETHER</h4>
                    <p id="expText" class="text-sm leading-relaxed text-slate-200"></p>
                </div>
                <div class="code-container shadow-2xl">
                    <div class="code-header bg-[#161b22] px-5 py-3 flex justify-between items-center border-b border-white/5"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Corrected Code</span><button onclick="copyCode()" class="text-blue-400 hover:text-white text-xs font-black transition" data-i18n="copy">نسخ 📋</button></div>
                    <pre id="preCode"><code></code></pre>
                </div>
                <div id="feedbackBox" class="glass p-6 rounded-[2rem] border border-blue-500/10 text-center">
                    <p class="text-xs font-bold text-slate-500 mb-4" data-i18n="feedback_q">هل كانت النتيجة مفيدة؟</p>
                    <div class="flex justify-center gap-8 mb-4"><i onclick="setRating('good')" id="rateGood" class="fas fa-thumbs-up text-2xl feedback-btn text-emerald-500"></i><i onclick="setRating('bad')" id="rateBad" class="fas fa-thumbs-down text-2xl feedback-btn text-red-500"></i></div>
                    <div id="commentBox" class="hidden space-y-3"><textarea id="feedbackComment" class="w-full h-20 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none" placeholder="ملاحظات إضافية..."></textarea><button onclick="sendFeedback()" class="w-full bg-slate-800 hover:bg-slate-700 py-2 rounded-xl text-xs font-bold transition" data-i18n="send">إرسال</button></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        const i18n = {
            ar: { subtitle: "مصحح ذكي عالمي", editor: "محرر الكود", upload: "رفع ملف", error: "رسالة الخطأ (اختياري)", inquiry_lbl: "عايز تعمل إيه بالكود؟", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل سيظهر هنا.", loading: "جاري التحليل...", ph_inq: "اكتب هدفك هنا...", copy: "نسخ 📋", paste: "لصق", analysis_title: "تحليل ذكاء AETHER", feedback_q: "هل النتيجة مفيدة؟", send: "إرسال" },
            en: { subtitle: "Universal AI Debugger", editor: "CODE EDITOR", upload: "Upload", error: "Terminal Error (Optional)", inquiry_lbl: "What's the goal?", btn: "Aether Debug ⚡", placeholder: "Results here.", loading: "Analyzing...", ph_inq: "Type goal...", copy: "COPY 📋", paste: "Paste", analysis_title: "AETHER ANALYSIS", feedback_q: "Was this helpful?", send: "Send" }
        };

        let currentRating = null;

        function changeUILang() {
            const lang = document.getElementById('uiLang').value;
            const t = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = t[el.getAttribute('data-i18n')]; });
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            document.getElementById('mainContainer').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }
        changeUILang();

        async function runDebugger() {
            const code = document.getElementById('codeInput').value;
            const inquiry = document.getElementById('inquiryInput').value;
            const error_log = document.getElementById('errorInput').value;
            if(!code && !inquiry) return alert("Please input something!");

            document.getElementById('loader').classList.remove('hidden'); document.getElementById('placeholder').classList.add('hidden'); 
            document.getElementById('resultArea').classList.add('hidden'); document.getElementById('commentBox').classList.add('hidden');

            const fd = new FormData();
            fd.append('code', code || "");
            fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', inquiry);
            fd.append('error_log', error_log);

            try {
                const response = await fetch('/api/index', { method: 'POST', body: fd });
                const data = await response.json();
                document.getElementById('expText').innerText = data.explanation || "Done.";
                const pre = document.getElementById('preCode');
                const cleanRes = (data.result || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                pre.innerHTML = `<code class="language-${document.getElementById('progLang').value.toLowerCase()}">${cleanRes}</code>`;
                
                setTimeout(() => {
                    Prism.highlightElement(pre.querySelector('code'));
                    document.getElementById('loader').classList.add('hidden'); document.getElementById('resultArea').classList.remove('hidden');
                }, 100);
            } catch (e) {
                alert("Error! Check connection.");
                document.getElementById('loader').classList.add('hidden'); document.getElementById('placeholder').classList.remove('hidden');
            }
        }

        function setRating(rate) { currentRating = rate; document.getElementById('rateGood').classList.toggle('active', rate === 'good'); document.getElementById('rateBad').classList.toggle('active', rate === 'bad'); document.getElementById('commentBox').classList.remove('hidden'); }
        async function sendFeedback() {
            const fd = new FormData(); fd.append('rating', currentRating); fd.append('comment', document.getElementById('feedbackComment').value); fd.append('code_context', document.getElementById('codeInput').value);
            const res = await fetch('/api/feedback', { method: 'POST', body: fd }); const data = await res.json(); alert(data.message);
            document.getElementById('feedbackBox').innerHTML = `<p class='text-emerald-400 font-bold text-xs'>${data.message}</p>`;
        }
        function copyCode() { navigator.clipboard.writeText(document.querySelector('#preCode code').textContent); alert("Copied! ✅"); }
        function pasteToCode() { navigator.clipboard.readText().then(t => document.getElementById('codeInput').value = t); }
        function handleFile(i) { const r = new FileReader(); r.onload = () => document.getElementById('codeInput').value = r.result; r.readAsText(i.files[0]); }
    </script>
</body>
</html>
