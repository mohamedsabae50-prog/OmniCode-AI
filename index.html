<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCode AI | Universal AI Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: #01040a; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; transition: 0.3s; overflow-x: hidden; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .editor-box { background: #0a0e17; border: 1px solid #21262d; border-radius: 1rem; }
        
        /* تحسين الخطوط للموبايل */
        textarea { font-size: 16px !important; } 
        
        .logo-text { font-family: 'Times New Roman', serif; font-size: 2.5rem; font-weight: bold; background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.4)); }
        
        .code-container { background: #0d1117; border-radius: 1.5rem; border: 1px solid #30363d; overflow: hidden; }
        .code-header { background: #161b22; padding: 10px 15px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        pre[class*="language-"] { padding: 1rem !important; margin: 0 !important; background: transparent !important; font-size: 12px !important; }
    </style>
</head>
<body class="min-h-screen p-3 md:p-10 rtl" id="mainContainer">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-6 md:mb-10 p-4 md:p-6 glass rounded-2xl md:rounded-[2.5rem] shadow-2xl gap-4 text-center md:text-right">
        <div class="flex items-center gap-3">
            <span class="logo-text">Æ</span>
            <div class="flex flex-col items-start">
                <h1 class="text-2xl md:text-3xl font-black italic tracking-tighter text-white">Aether<span class="text-blue-400 font-light">Code</span></h1>
                <span class="text-[9px] text-slate-400 tracking-widest uppercase">Universal AI Debugger</span>
            </div>
        </div>
        <div class="flex gap-2 md:gap-4 items-center w-full md:w-auto justify-center">
            <select id="uiLang" onchange="changeUILang()" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-[10px] font-bold outline-none">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
            </select>
            <select id="progLang" class="flex-1 md:flex-none bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-[10px] font-bold outline-none">
                <option>Python</option><option>JavaScript</option><option>Java</option><option>C++</option><option>SQL</option>
            </select>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10">
        <div class="space-y-4 md:space-y-6">
            <div class="glass p-5 md:p-8 rounded-[2rem] md:rounded-[3rem] shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <span id="lblEditor" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">محرر الكود</span>
                    <label class="text-[10px] text-blue-400 cursor-pointer"><i class="fas fa-file-code"></i> <input type="file" id="fileInp" class="hidden" onchange="handleFile(this)"> <span id="lblUpload">رفع ملف</span></label>
                </div>
                
                <textarea id="codeInput" placeholder="ضع كود أي لغة هنا..." class="w-full h-48 md:h-72 editor-box p-4 md:p-6 text-sm text-blue-300 outline-none resize-none font-mono mb-4"></textarea>
                
                <span id="lblError" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-2">رسالة الخطأ (اختياري)</span>
                <textarea id="errorInput" placeholder="انسخ الخطأ هنا..." class="w-full h-20 bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs text-red-400 outline-none resize-none mb-4"></textarea>
                
                <input id="inquiryInput" type="text" placeholder="عايز تعمل إيه بالكود؟" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition mb-4">
                
                <button onclick="runDebugger()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-lg md:text-xl shadow-lg transition-all active:scale-95">
                    <span id="lblBtn">تصحيح وتحويل ذكي ⚡</span>
                </button>
            </div>
        </div>

        <div class="relative">
            <div id="loader" class="hidden glass min-h-[300px] h-full rounded-[2rem] md:rounded-[3rem] flex flex-col items-center justify-center p-10 text-center">
                <i class="fas fa-brain fa-spin text-4xl text-blue-500 mb-4"></i>
                <p id="lblLoading" class="text-xs animate-pulse">Analyzing cortex logic...</p>
            </div>
            
            <div id="placeholder" class="glass min-h-[300px] h-full rounded-[2rem] md:rounded-[3rem] flex flex-col items-center justify-center text-slate-700 p-6 text-center italic">
                <i class="fas fa-code-branch text-5xl mb-4 opacity-10"></i>
                <p id="lblPlaceholder" class="text-sm">التحليل والحل سيظهر هنا.</p>
            </div>

            <div id="resultArea" class="hidden space-y-4 md:space-y-6">
                <div class="glass p-5 md:p-6 rounded-[1.5rem] md:rounded-[2rem] border-r-4 border-emerald-500">
                    <h4 class="text-[10px] font-bold text-emerald-400 mb-2 uppercase tracking-widest">Aether Cortex Analysis</h4>
                    <p id="expText" class="text-sm leading-relaxed text-slate-300 italic"></p>
                </div>
                
                <div class="code-container">
                    <div class="code-header">
                        <span id="langLabel" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Code</span>
                        <div class="flex gap-3">
                            <button onclick="copyCode()" class="text-blue-400 hover:text-white text-[10px] font-bold transition">COPY 📋</button>
                        </div>
                    </div>
                    <pre><code id="resCode" class="line-numbers"></code></pre>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        const i18n = {
            ar: { editor: "محرر الكود", upload: "رفع ملف", error: "رسالة الخطأ", btn: "تصحيح وتحويل ذكي ⚡", placeholder: "التحليل والحل سيظهر هنا بتنسيق احترافي.", loading: "جاري تحليل المنطق...", ph_code: "ضع كود أي لغة هنا...", ph_err: "انسخ الخطأ هنا...", ph_inq: "عايز تعمل إيه بالكود؟" },
            en: { editor: "Code Editor", upload: "Upload", error: "Error Log", btn: "Aether Debug ⚡", placeholder: "Analysis will appear here.", loading: "AI thinking...", ph_code: "Paste code here...", ph_err: "Paste error here...", ph_inq: "What's the goal?" }
        };

        function changeUILang() {
            const lang = document.getElementById('uiLang').value;
            const t = i18n[lang];
            const container = document.getElementById('mainContainer');
            document.getElementById('lblEditor').innerText = t.editor;
            document.getElementById('lblBtn').innerText = t.btn;
            document.getElementById('lblPlaceholder').innerText = t.placeholder;
            document.getElementById('codeInput').placeholder = t.ph_code;
            document.getElementById('inquiryInput').placeholder = t.ph_inq;
            container.dir = lang === 'ar' ? 'rtl' : 'ltr';
        }

        async function runDebugger() {
            const code = document.getElementById('codeInput').value;
            const inquiry = document.getElementById('inquiryInput').value;
            if(!code && !inquiry) return alert("اكتب حاجة يا هندسة!");

            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const placeholder = document.getElementById('placeholder');
            
            loader.classList.remove('hidden'); placeholder.classList.add('hidden'); resArea.classList.add('hidden');

            const fd = new FormData();
            fd.append('code', code || "");
            fd.append('lang', document.getElementById('progLang').value);
            fd.append('ui_lang', document.getElementById('uiLang').value);
            fd.append('inquiry', inquiry);
            fd.append('error_log', document.getElementById('errorInput').value);

            try {
                const response = await fetch('/api/index', { method: 'POST', body: fd });
                const res = await response.json();
                const data = typeof res === 'string' ? JSON.parse(res) : res;

                document.getElementById('expText').innerText = data.explanation;
                const codeEl = document.getElementById('resCode');
                codeEl.textContent = data.result;
                Prism.highlightElement(codeEl);

                loader.classList.add('hidden'); resArea.classList.remove('hidden');
            } catch (e) {
                alert("Error! Check connection.");
                loader.classList.add('hidden'); placeholder.classList.remove('hidden');
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('resCode').textContent);
            alert("تم النسخ! ✅");
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('codeInput').value = reader.result;
            reader.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
